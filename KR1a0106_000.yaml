body:
  text: 周易易簡説易類提要臣等謹案周易易簡説三卷明髙攀龍撰攀龍字雲從無錫人萬厯己丑進士官至左都御史贈太子少保兵部尚書諡忠憲事迹具明史本傳是書詮解易義每條不過數言自序云其知易知其能簡能易簡而天下之理得又曰五經注于後儒易注于夫子説易者明夫子之言而易明矣是其著書大旨也攀龍之學出入朱陸之間故以心言易然其説曰天下有非易之心而無非心之易是故貴于學也學也者知非易則非心非心則非易易則吉非易則凶悔吝云云則其説主于學易以檢心非如楊簡王宗傳等引易以歸心學引心學以歸禪學務屏棄象數離絶事物遁于恍惚窅冥以為不傳之祕也是固不得謂以心言易為攀龍之失矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀周易易簡説原序夫易豈難知者乎哉豈難能者乎哉天髙地下萬物散殊八者流動充滿于吾前吾于其中具形而為一物天地之八者未嘗不備于吾吾之八者未嘗不充塞于天地靜而成象動而成占成象者退藏而為密成占者神明焉而為德吉凶悔吝如日月之彰彰焉而冥行者不知也聖人惻然患之莫能致力則以易示之又詔之曰占故曰易者卜筮之謂也卜筮者占之謂也靜而不密則不占動而不得則不占至將有為也將有行也問之以蓍則卜筮之一事云爾謂蓍不足以盡占可謂占不足以盡易不可雖然不見易而能知者鮮矣則謂蓍為占也亦宜于何見易曰易無之而非是識其無之而非是無之不可見易也然果何物也曰吾之心也天下有非易之心而無非心之易是故貴于學學也者知非易則非心非心則非易也易則吉非易則凶悔吝其知易知其能簡能易簡而天下之理得矣于是作易簡説夫五經注于後儒易注于夫子説易者明夫子之言而明易矣
