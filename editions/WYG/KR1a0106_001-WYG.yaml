body:
  text: 周易易簡說卷一明高攀龍撰上經乾上乾下乾元亨利貞夫乾元亨利貞而已終古一元亨利貞也終嵗一元亨利貞也一人一物一元亨利貞也元亨利貞盡乎乾盡乎易矣故學易者當實見之見之于天乎未也見之于人乎未也天人一物也人之一呼吸天之一闔闢也一元亨利貞也此之謂天行此之謂不息初九潛龍勿用龍陽象潛下象聖人乗潛則勿用時位然也九二見龍在田利見大人二陽出地上故曰見龍曰在田聖人為天下所利見矣九三君子終日乾乾夕惕若厲无咎三人位也君子終日乾乾夕惕若人道也九四或躍在淵无咎四即體而用矣故曰或躍用不離潛故曰在淵上下進退惟其時焉故无咎也九五飛龍在天利見大人九五飛龍則首出庻物萬國以之咸寧者也然則聖人首飛龍乎非也大中至正位乎天徳為一卦之主也上九亢龍有悔亢龍所以有悔言時位非言聖人用九見羣龍无首吉用九者六爻皆九也六爻皆九則六龍俱見矣六龍俱見則六龍俱變而无首矣易以首為終无首者无終窮也天徳又何終窮之有此天下所以治天則所以見故曰見羣龍无首吉彖曰大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乗六龍以御天乾道變化各正性命保合太和乃利貞首出庶物萬國咸寧萬物資始言元也雲行雨施言亨也各正性命保合太和言利貞也何以元亨之下有大明終始三言利貞之下有首出庶物兩言也言元亨利貞則六位之終始惟聖人大明之時乗六龍以御天而乾道始得成其變化萬物始得保合其太和是聖人首出于庶物萬國以之咸寧者也无天道則无人道无人道亦无天道天人一而已矣象曰天行健君子以自强不息君子何以能自强不息也以天行也天行自不息君子之心天行也何息之有非此之以而能不息乎六十四卦之以皆以此也潛龍勿用陽在下也在下則勿用所謂易之序見龍在田徳施普也見龍在田聖人未用于世也而徳施普矣故人患无徳不患无位終日乾乾反復道也反復于道一乾惕而已或躍在淵進无咎也或之而聖人之見審矣飛龍在天大人造也大人造即聖人作也亢龍有悔盈不可久也陽至六而盈故爻至六而止易與天地凖如此用九天徳不可為首也天徳循環无端故不可為首文言曰元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事君子行此四徳者故曰乾元亨利貞元亨利貞者仁義禮智也聖人何以不言智智不可見見之于幹事之貞離事无智智无朕也君子行此四徳者故曰乾元亨利貞可見乾一君子也君子一乾也言合天人者猶二之矣初九潛龍勿用何謂也子曰龍徳而隠者也不易乎世不成乎名遯世无悶不見是而无悶樂則行之憂則違之確乎其不可拔潛龍也不為世易不成世名世不我知知不我是弗顧也行其樂天之誠違其憂世之志確乎不拔所以為潛龍九二曰見龍在田利見大人何謂也子曰龍徳而正中者也庸言之信庸行之謹閑邪存其誠善世而不伐徳博而化易曰見龍在田利見大人君徳也九二龍徳正中所謂中庸其至矣此人性之本色惟聖人造其極夫何為哉庸言庸行之信謹而巳閑邪存其誠而已善施而徳化聖人不知也故曰篤恭而天下平九三曰君子終日乾乾夕惕若厲无咎何謂也子曰君子進徳修業忠信所以進徳也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危无咎矣人道惟在忠信立誠在于修辭至者至此終者終此進徳修業居上居下有何限事在其道在此而已孰知其在此而已也故知至知終為難九四曰或躍在淵无咎何謂也子曰上下无常非為邪也進退无恒非離羣也君子進徳修業欲及時也故无咎或者從時也聖人仕止久速惟其時也九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各従其類也聖人作而萬物覩莫知其然而然上九曰亢龍有悔何謂也子曰貴而无位髙而无民賢人在下位而无輔是以動而有悔也動而有悔則不宜動明矣潛龍勿用下也見龍在田時舍也終日乾乾行事也或躍在淵自試也飛龍在天上治也亢龍有悔窮之災也乾元用九天下治也不可為首者天徳也天下治者王道也有天徳便有王道潛龍勿用陽氣潛藏見龍在田天下文明終日乾乾與時偕行或躍在淵乾道乃革飛龍在天乃位乎天徳六龍皆天徳也而非其位故飛龍曰乃位乎天徳亢龍有悔與時偕極乾元用九乃見天則用九而必曰乾元者何也乾元言其始用九言其終六位乗而天則見六龍乗而天下平也乾元用九者時乗六龍也潛見惕躍飛亢各因其則如四時不易故曰乃見天則乾元者始而亨者也利貞者性情也乾始能以美利利天下不言所利大矣哉以始而亨故曰乾元成其性情故曰利貞何莫非利不可言其所利此貞之所以无朕而乾元所以為大也大哉乾乎剛健中正純粹精也六爻發揮旁通情也時乗六龍以御天也雲行雨施天下平也大哉乾乎性也體也六爻發揮情也用也時乗六龍者聖人也雲行雨施者聖人也明言乾而以聖人當之然則天邪人邪一邪二邪君子以成徳為行日可見之行也潛之為言也隠而未見行而未成是以君子弗用也初九成徳也以其隠而未見故行而未著君子見而後用之君子學以聚之問以辨之寛以居之仁以行之易曰見龍在田利見大人君徳也九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危无咎矣重剛不中時位然也聖人乗之乾惕而已因時而惕者无時不惕也九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故无咎不天不田不人故在淵虚圓無滯者或之理也夫大人者與天地合其徳與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而況於人乎況於鬼神乎大人者天地日月四時鬼神也所謂乾元亨利貞也亢之為言也知進而不知退知存而不知亡知得而不知喪其唯聖人乎知進退存亡而不失其正者其唯聖人乎亢之為言也言其時也所以有悔也其唯聖人乎言其道也所以无悔也坤下坤上坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉彖曰至哉坤元萬物資生乃順承天坤厚載物徳合无疆含𢎞廣大品物咸亨牝馬地類行地無疆柔順利貞君子攸行先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶安貞之吉應地无疆坤之元即乾之元也坤透體皆乾乾元在坤故曰坤元資生者生其所始也一元之氣於是乎成形亨乾之亨利乾之利貞乾之貞順承乾而已故曰牝馬之貞乾健而坤従如牡行而牝従馬乾而牝坤也乾无疆而坤徳則合之坤無疆而君子之徳則合之三才一而已隂道從陽先則迷而失道後則順而得常常者利養萬物之常坤主利物而已西南得朋陰之類也固其常也東北喪朋陽之従也正其慶也慶者以其從陽而利物此君子安貞之吉應乎地之無疆者也象曰地勢坤君子以厚徳載物地之勢何其順乎君子順萬物之性因其勢而利導所以能厚載也初六履霜堅氷至象曰履霜堅氷陰始凝也馴致其道致堅氷也君子履霜而知堅氷之至矣其至雖漸有必至焉蚤辨者辨諸此六二直方大不習无不利象曰六二之動直以方也不習无不利地道光也順乾而動故直方大不習无不利也六三含章可貞或從王事无成有終象曰含章可貞以時發也或從王事知光大也含章可貞非不發也以時發也不居其成功豈獨臣職有終保其令終矣六四括囊无咎无譽象曰括囊无咎慎不害也括囊者君子之隠也重坤不中而括囊守正順時免害道莫尚於此矣非為居位者言也六五黃裳元吉象曰黃裳元吉文在中也曰黃則有𤣥在曰裳則有衣在順徳在中何文如之上六龍戰于野其血𤣥黃象曰龍戰于野其道窮也于六稱龍陽無終滅之理于戰稱血陰有必窮之勢雖𤣥黃並血而尊卑自辨也用六利永貞象曰用六永貞以大終也用六者六爻皆六也六爻皆六皆從乾矣永其牝馬之貞是以大終也文言曰坤至柔而動也剛至靜而徳方後得主而有常含萬物而化光坤道其順乎承天而時行順乾而動故剛一于從乾故方惟其後也故利物有常惟其含也故生物化光承天時行不違毫髮所以剛柔動靜為物不貳也積善之家必有餘慶積不善之家必有餘殃臣弑其君子弑其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅氷至葢言順也坤惟一順而順當早辨善而順積而餘慶不善而順積而餘殃至于堅氷亦以順致危哉其在履霜之漸乎直其正也方其義也君子敬以直内義以方外敬義立而徳不孤直方大不習无不利則不疑其所行也直方者本體敬義者合本體之工夫所以能大所以能不習而无不利也非乾无坤非坤无乾非人无乾坤非乾坤无人故曰三才者一而已矣陰雖有美含之以従王事弗敢成也地道也妻道也臣道也地道无成而代有終也坤主含收歛謹畏待時而行故成曰弗敢有終曰代含之至也天地變化草木蕃天地閉賢人隠易曰括囊无咎无譽葢言謹也順時而隠非賢者不能中心无欲氣至而應也君子黃中通理正位居體美在其中而暢于四支發于事業美之至也通大中之理居為下之體順徳積中發外美蔑以加矣陰疑於陽必戰為其嫌於无陽也故稱龍焉猶未離其類也故稱血焉夫𤣥黃者天地之雜也天𤣥而地黃陰進于六至于野矣陰之極也而天地雜焉雜而必以陽為主故稱龍主而猶未離乎陰故稱血疑而雜雜而戰戰而血血而𤣥黃而龍已儼然在矣謂坤无陽也可乎震下坎上屯元亨利貞勿用有攸往利建侯彖曰屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧宜建侯而不寧乾坤之後乾一交于坤而為震再交于坤而為坎震坎合而為屯故曰剛柔始交而難生難生者坎也震動乎坎險之中生機結而未暢所以為屯大亨貞者以雷雨滿盈生物伊始然洪荒開闢天運方草雜昧晦宜建侯而未遑寧處也卦以震為主爻以初為主凡卦皆有主爻而一卦之吉凶係之矣象曰雲雷屯君子以經綸天下方屯千端萬緒君子經以分之綸以合之便各有條理天地以雲雷生萬物君子以經綸理萬物也初九磐桓利居貞利建侯象曰雖磐桓志行正也以貴下賤大得民也磐石桓柱也國之柱石鎮定不搖居貞如是利建如是之侯雖未有所作為而志行之正下賤之誠能大得民也六二屯如邅如乗馬班如匪宼婚媾女子貞不字十年乃字象曰六二之難乗剛也十年乃字反常也六二乗剛初雖非宼而求婚媾故于二為難不字曰貞者非正應也正應之婚媾至十年乃字而復其常五不能得二二又不能得初此膏之所以屯也六三即鹿無虞惟入于林中君子幾不如舍往吝象曰即鹿無虞以從禽也君子舍之往吝窮也三不當初而應上之陰柔如即鹿無虞又以従禽惟入于林中而已言无禽也六四乗馬班如求婚媾往吉无不利象曰求而往明也四應初故能求婚媾而吉九五屯其膏小貞吉大貞凶象曰屯其膏施未光也九五屯其膏其施未行于事可小正不可大正者以不當初而二又不能得初也上六乗馬班如泣血漣如象曰泣血漣如何可長也上六則終于屯而已一卦主爻在初故吉凶随其向背也坎下艮上蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞彖曰蒙山下有險險而止蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也蒙以坎為主主爻在二雖上九亦用艮主禦宼而不當時中之位故如屯之九五不以為主也蒙者性未開通善通之則亨惟時中能亨之匪我求童蒙童蒙求我雖蒙之志應亦二之善感初筮告再三瀆瀆則不告非施之當可則反窒其真明瀆不在蒙在告蒙者不迎其機而汩之則瀆亂之矣故曰瀆蒙正者蒙之固有養之即為聖功也象曰山下出泉蒙君子以果行育徳山下出泉浚發而渟泓故以果其行育其徳初六發蒙利用刑人用說桎梏以往吝象曰利用刑人以正法也發蒙者以身儀刑之自能脫其桎梏若􅉨而過求則吝矣九二包蒙吉納婦吉子克家象曰子克家剛柔接也二五剛柔交接以師包蒙以夫納婦以子克家皆謂五也六三勿用取女見金夫不有躬无攸利象曰勿用取女行不順也三不當二而應上故為見金夫不有躬之女六四困蒙吝象曰困蒙之吝獨逺實也六四不當二而所居所比所應皆隂為無陽之爻故獨逺實而為困蒙六五童蒙吉象曰童蒙之吉順以巽也童蒙其赤子之天真乎上九擊蒙不利為宼利禦宼象曰利用禦宼上下順也上擊三者也不為宼而禦宼則上下順矣禦宼者艮止也因其固有非强其本无故順乾下坎上需有孚光亨貞吉利涉大川彖曰需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利涉大川往有功也需之所以有孚光亨貞吉者以九五之得位而正中也剛健能需不陷于險涉川之道孰加焉象曰雲上于天需君子以飲食宴樂古人以燕客為需故需曰飲食宴樂其心之恬夷貞靜也何如初九需于郊利用恒无咎象曰需于郊不犯難行也利用恒无咎未失常也天下之可恒者惟常而已君子之安于常者曠如郊焉又何犯難之有九二需于沙小有言終吉象曰需于沙衍在中也雖小有言以吉終也二以在中故衍沙在水而水不濡能使水流通而无礙衍正流通无礙之象也九三需于泥致宼至象曰需于泥災在外也自我致宼敬慎不敗也需于泥則致宼矣然自我致之敬慎則不敗也六四需于血出自穴象曰需于血順以聽也需于血則入于災矣然有順聽之道焉順聽焉則出自穴矣九五需于酒食貞吉象曰酒食貞吉以中正也君子酒食于中正之道順其遇之所安而無容心焉故曰需于酒食貞吉也上六入于穴有不速之客三人來敬之終吉象曰不速之客來敬之終吉雖不當位未大失也以上居六安其所處故曰入于穴柔順而能敬三陽之進吉之道也曰不當位者上无位也坎下乾上訟有孚窒惕中吉終凶利見大人不利涉大川彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也凡訟之成皆以險健故上剛下險而為訟二五成卦之主剛險相對然九二剛來得中故有孚窒惕不成訟而吉終則成而凶矣九五中正天理之至當也人能見理何訟之能成不上從天理之正則下陷人欲之險故涉川則入淵聖人垂象豈不深切著明乎象曰天與水違行訟君子以作事謀始天水違行成訟之象作事謀始絶訟之源初六不永所事小有言終吉象曰不永所事訟不可長也雖小有言其辯明也訟宜止于初初六不永故雖小有言而終吉以上應九四之剛非能訟者與上九終㓙正相反也九二不克訟歸而逋其邑人三百戸无眚象曰不克訟歸逋竄也自下訟上患至掇也卦雖二五兩剛相敵而二居下知下不可訟上故不克訟歸而逋所謂有孚能窒能惕而得中雖其邑人三百戸亦得无眚也彖言吉爻不言吉者彖言一卦之才爻明一爻之位安于位而不克訟无患而已在訟之時為然卦有小大也六三食舊徳貞厲終吉或從王事无成象曰食舊徳従上吉也三曰從上吉者從上九也以柔應剛安其素分貞固自守雖厲而終吉或從王事亦无成也九四不克訟復即命渝安貞吉象曰復即命渝安貞不失也四應初而初不永訟四亦不克訟而復于義命渝而安貞故吉也九五訟元吉象曰訟元吉以中正也九五中正訟之元吉者也故為訟所利見上九或錫之鞶帶終朝三褫之象曰以訟受服亦不足敬也上九訟之終所謂終凶也聖人發終凶之義言雖勝而受服必即見褫終朝言褫之速三言褫之衆為戒深矣坎下坤上師貞丈人吉无咎彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣五隂之衆一陽能左右之使歸于正所謂師貞剛中而應行險而順所謂丈人雖毒天下而民悦從故吉而无害義而无咎也象曰地中有水師君子以容民畜衆容民畜衆如水之容畜于地中也初六師出以律否臧凶象曰師出以律失律凶也律者行軍之法如肅部伍嚴賞罰審天時察地利之類失之于初則无律矣否臧者失律也九二在師中吉无咎王三錫命象曰在師中吉承天寵也王三錫命懐萬邦也剛中而應故承天之寵王三錫命命斯人而後可懐萬邦也九三師或輿尸凶象曰師或輿尸大无功也輿尸者戰敗也六四師左次无咎象曰左次无咎未失常也六四能全其師者也六五田有禽利執言无咎長子帥師弟子輿尸貞凶象曰長子帥師以中行也弟子輿尸使不當也田有禽非大害斯民者弗師利執言非大義可聲者弗師長子丈人故能帥師弟子非丈人故有輿尸之凶上六大君有命開國承家小人勿用象曰大君有命以正功也小人勿用必亂邦也師終賞功嚴小人之用象申之曰必亂邦也後世専取小人之才者何哉坤下坎上比吉原筮元永貞无咎不寧方來後夫凶彖曰比吉也比輔也下順従也原筮元永貞无咎以剛中也不寧方來上下應也後夫凶其道窮也比者吉道也輔也下順従也原筮再筮重審也凡比人與比于人有元永貞之徳如九五者无咎也人之不得所比則不寧不寧故方來天下應之而後者凶矣象曰地上有水比先王以建萬國親諸侯衆建諸侯以比民也初六有孚比之无咎有孚盈缶終來有他吉象曰比之初六有他吉也易重初初者未變之心也故曰有孚充積之而至盈缶有他吉也他吉者非意之吉由四以比五也六二比之自内貞吉象曰比之自内不自失也自内者由己也守其中道不自失也比卦五陰皆主比五而比之為道則在守正六三比之匪人象曰比之匪人不亦傷乎比主比五非五則匪人矣三應上故以戒之六四外比之貞吉象曰外比于賢以從上也四外比五比賢從上貞吉可知九五顯比王用三驅失前禽邑人不誡吉象曰顯比之吉位中正也舍逆取順失前禽也邑人不誡上使中也五无心成比如天之無私王道之至純也三驅失前禽者三面之網前開一面以為門自門驅而入禽之出者向我而逆則舍之故无面傷入者順我而去故自膘達肩為上殺舍逆取順所取者所失者也上六比之无首凶象曰比之无首无所終也在上為首首為終故爻曰无首象曰无終乾下巽上小畜亨密雲不雨自我西郊彖曰小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨密雲不雨尚往也自我西郊施未行也以一陰畜五陽故曰小健而巽剛中而志行乃亨見亨不在小也雲未雨而尚往雨未施而密于西郊陽為陰畜也然則小畜之所以亨者止以五陽得位而已象曰風行天上小畜君子以懿文徳懿文徳取畜象文徳雖小而懿之足以行其道如風行天上所謂无文不行也初九復自道何其咎吉象曰復自道其義吉也復于自有之道何吉如之九二牽復吉象曰牽復在中亦不自失也牽復于中與初同吉也不自失者不失于陰也九三輿說輻夫妻反目象曰夫妻反目不能正室也九三比陰為陰畜制如輿之說輻而不能行雖夫妻亦反目矣曰不能正其室則失不在妻也輻當作輹輹在輿下説則不行輻在輿中不可脱也六四有孚血去惕出象曰有孚惕出上合志也六四孚五故血去惕出而无咎可見四之能畜乾者非四之力也九五有孚攣如富以其鄰象曰有孚攣如不獨富也九五孚于同體有攣如之固如富者之能以其鄰此所以成畜乎上九既雨既處尚徳載婦貞厲月幾望君子征凶象曰既雨既處徳積載也君子征凶有所疑也上九畜之成未雨者既雨矣尚􅉨者既處矣尊尚柔徳積而滿矣媍將敵陽故厲陽有所征必凶小畜者陰道也故聖人為戒如此兌下乾上履虎尾不咥人亨彖曰履柔履剛也說而應乎乾是以履虎尾不咥人亨剛中正履帝位而不疚光明也履進進不已也和恱而順乎天理以是而履雖履虎尾而不咥人也君子之履如履虎尾柔心而應剛中之道故曰柔應剛九五中正光明无疚卦之所以亨也象曰上天下澤履君子以辯上下定民志上天下澤定分秩然君子所以行无越思者以此初九素履往无咎象曰素履之往獨行願也素者本色也履其素往又何咎大人不失赤子之心末世追隆古之道感遇萬變而素位者无入不自得焉所謂素履也九二履道坦坦幽人貞吉象曰幽人貞吉中不自亂也六三眇能視跛能履履虎尾咥人凶武人為于大君象曰眇能視不足以有明也跛能履不足以與行也咥人之凶位不當也武人為于大君志剛也君子雖中天下定四海而幽人之心自若故可敝屣天下才弱而志剛鮮不及于患矣不曰武人為大君而曰為于大君者三非君位乃以武人為于大君之事非其人非其位象其志如此也九四履虎尾愬愬終吉象曰愬愬終吉志行也三四皆曰履虎尾以乾兌相躡而四得終吉者健而敬其才能勝其志得行也九五夬履貞厲象曰夬履貞厲位正當也以九五之中正而夬決猶有貞厲之戒此所以履帝位而不疚也夫上九視履考祥其旋元吉象曰元吉在上大有慶也履而曰視則非㝠行視其履考其祥周旋而无􅉛乃元吉也履終而元吉斯大慶矣乾下坤上泰小往大來吉亨彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也内陽而外陰内健而外順内君子而外小人君子道長小人道消也凡陽在内必上凡陰在外必下故天地交陽來為主于内小往聴従于外世之治也治世豈盡無小人君子在内小人在外云爾象曰天地交泰后以財成天地之道輔相天地之宜以左右民象于泰曰后于否曰君子聖人在天位而世始泰君子在下位而世始否初九拔茅茹以其彚征吉象曰拔茅征吉志在外也拔茅茹者以其彚之象君子進而用世退而自藏必以其彚九二包荒用馮河不遐遺朋亡得尚于中行象曰包荒得尚于中行以光大也仁无不包義无不正逺无所遺近无所比非中行光大者其誰能之此之謂乾道九三无平不陂无往不復艱貞无咎勿恤其孚于食有福象曰无往不復天地際也君子所以持平陂往復之間者惟艱貞而已艱貞則自孚孚則自食其福矣六四翩翩不富以其鄰不戒以孚象曰翩翩不富皆失實也不戒以孚中心願也陰之必下其象如此六五帝乙歸妹以祉元吉象曰以祉元吉中以行願也以陰從陽福祉所歸也上六城復于隍勿用師自邑告命貞吝象曰城復于隍其命亂也國家命亂遂成復隍然聖人于此猶有道焉曰勿用師自邑告命而已雖貞吝尚可自守自昔亂亡之國未有不昧斯理者也坤下乾上否之匪人不利君子貞大往小來彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下无邦也内陰而外陽内柔而外剛内小人而外君子小人道長君子道消也匪人非人道也否之匪人者否時无人道之人不利于君子之正道也象曰天地不交否君子以儉徳辟難不可榮以祿君子之儉徳避難不可榮以祿者也可榮以祿而容容為儉徳避難者乃持位固寵苟免而无恥也初六拔茅茹以其彚貞吉亨象曰拔茅貞吉志在君也否之初否未甚也君子見幾以其彚貞則吉而亨矣然豈忘世哉其志則在君也故聖人復明君子彚貞之志六二包承小人吉大人否亨象曰大人否亨不亂羣也二之時小人猶知承君子君子雖包其承不亂入其羣乃為否亨六三包羞象曰包羞位不當也三之時小人恣肆而攻正可羞甚矣在下之君子但包其羞有无限深意存焉小人處非其位又安能久也九四有命无咎疇離祉象曰有命无咎志行也命謂天命君子疇類皆獲福祉矣泰之過中君子以艱貞而食福否之過中君子以有命而離祉然則君子固常立于福祉之中也九五休否大人吉其亡其亡繫于苞桑象曰大人之吉位正當也休否必大人也而聖人猶為其亡之戒苞桑者初生之柔桑繫于苞桑者危之之辭而非以為固也上九傾否先否後喜象曰否終則傾何可長也傾者反而為泰也兩卦相綜陰陽進退治亂循環而无窮也離下乾上同人于野亨利涉大川利君子貞彖曰同人柔得位得中而應乎乾曰同人同人曰同人于野亨利涉大川乾行也文明以健中正而應君子正也唯君子為能通天下之志卦之所以為同人者以六二得位得中而應乾也卦之所以亨而利涉大川利君子貞者以九五中正而應二也然則柔非從剛不亨剛非中正不亨君子所以能通天下之志者可識矣象曰天與火同人君子以類族辨物君子之辨物也惟不同乃所以為同初九同人于門无咎象曰出門同人又誰咎也初九未染于物无私係之累故能出門同人而无咎也六二同人于宗吝象曰同人于宗吝道也二五相應在他卦至吉矣于同人則為道之吝道大同无我雖同于宗道未大也九三伏戎于莽升其高陵三嵗不興象曰伏戎于莽敵剛也三嵗不興安行也三四非中正故不能同人伏戎于莽戎心也升其高陵亢氣也動足皆荆棘之途將安之乎九四乗其墉弗克攻吉象曰乗其墉義弗克也其吉則困而反則也四剛而居柔故有乗墉之妄有反則之吉九五同人先號咷而後笑大師克相遇象曰同人之先以中直也大師相遇言相克也九五以中直同人又何大師相克之有同人者无我也无我豈易言哉非有大師之相克不能有斷金之相遇故克己為乾道之要上九同人于郊无悔象曰同人于郊志未得也上九清逺閑曠幽人貞士之同人故曰志未得也乾下離上大有元亨彖曰大有柔得尊位大中而上下應之曰大有其徳剛健而文眀應乎天而時行是以元亨大有以柔得尊位大中而上下應之也元亨以剛健文明應乎天而時行也所以大善亨通者以應天時行所以應天時行者以大明中天柔之為道至大有之五而徳乃其至矣非九二何能成之象曰火在天上大有君子以遏惡揚善順天休命火在天上大明也遏惡揚善大明而應乎天也故曰順天休命初九无交害匪咎艱則无咎象曰大有初九无交害也大有以上下交孚為利故初九以无交為害然非咎也亦必艱則无咎者特立獨行固非易事也九二大車以載有攸往无咎象曰大車以載積中不敗也乾剛得中大无不容故積而不敗也九三公用亨于天子小人弗克象曰公用亨于天子小人害也公能歸富有于天子故亨于天子小人私富有于一身故害于一身君子之亨小人之害矣九四匪其彭无咎象曰匪其彭无咎明辯晳也鼓旁擊之曰東中擊之曰彭連聲曰彭彭借以為車聲之盛曰出車彭彭匪其彭不有其盛也六五厥孚交如威如吉象曰厥孚交如信以發志也威如之吉易而无備也六五之孚于二者有天然之信發人之志意有天然之威不由于戒備非大明應天之主何由與于斯乎此所以大有也上九自天祐之吉无不利象曰大有上吉自天祐也上下應之曰大有上應五者也故曰履信思順尚賢而自天祐之也艮下坤上謙亨君子有終彖曰謙亨天道下濟而光明地道卑而上行天道􅉛盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也天惟其下也而光明地惟其卑也而上行謙與盈正相反盈則必害故謙則必亨居尊而徳光居卑而徳不可踰君子有終者以此自古君子之不有其終者豈少也乎有功而自有之也至于身之不保而功則安在易所以重有終之戒與象曰地中有山謙君子以裒多益寡稱物平施裒聚多者益其寡者稱物而平施之凡君子平其不平皆地中有山之義也初六謙謙君子用涉大川吉象曰謙謙君子卑以自牧也謙之最下故曰謙謙六二鳴謙貞吉象曰鳴謙貞吉中心得也積中發外寔大聲宏者曰鳴二之鳴謙由於中心所自得而人皆聞之非二之自鳴也九三勞謙君子有終吉象曰勞謙君子萬民服也三居下之上上為君任下為衆歸而山在地中正謙之所以為謙而彖之所謂君子有終者也六四无不利撝謙象曰无不利撝謙不違則也撝施布之意動容周旋无所施而非謙无所施而不利也四承五而乗三其則如此六五不富以其鄰利用侵伐无不利象曰利用侵伐征不服也謙者天地人神所歸故不富以其鄰抗兵相加得衆者勝謙為用師吉道聖人於五上兩言之上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也上為柔順之極亦曰鳴謙然而位處乎上非其志之所安謙順之極則衆之所與故可用行師征邑國而已坤下震上豫利建侯行師彖曰豫剛應而志行順以動豫豫順以動故天地如之而況建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉九四一剛五陰應之其志得行順道以動人无不服故歡欣恱豫而為豫也建侯行師在得衆而已順以動者順時而動也動不以時則動非其義矣如豫之時如豫之義天下无事不可為也象曰雷出地奮豫先王以作樂崇徳殷薦之上帝以配祖考先王之作樂以萬國之歡心盛薦其崇徳于上帝祖考也初六鳴豫凶象曰初六鳴豫志窮凶也初六陰柔小人得上應與志意滿極以豫自鳴其凶可知矣六二介于石不終日貞吉象曰不終日貞吉以中正也六二貞于中正之道明于理欲之介如石之堅確不移故能見事之幾微不終日而決也非介石而何能知幾乎六三盱豫悔遲有悔象曰旴豫有悔位不當也六三上視于四不能自立其悔宜矣去之不終日庻幾免乎故豫吉在斷其悔在遲九四由豫大有得勿疑朋盍簪象曰由豫大有得志大行也九四由和順之道致時于豫故大得上下之應然上有逼君之疑下有得衆之疑己既有疑人亦疑焉何能致盍簪之朋乎大臣之道直身任天下之事而已无他顧也六五貞疾恒不死象曰六五貞疾乗剛也恒不死中未亡也于此見中也者生人之命脈中未亡貞疾恒不死矣上六㝠豫成有渝无咎象曰㝠豫在上何可長也豫上故㝠動極故渝雖昏㝠之成而渝則无咎故順動之道知其不善速改以從善而已象云何可長者何可遲也故成有渝貴不終日震下兊上隨元亨利貞无咎彖曰隨剛來而下柔動而說隨大亨貞无咎而天下隨時隨時之義大矣哉隨者隨時也隨時者從道也剛來而下柔其心下矣心下則能隨時以從道元亨利貞天道也動以天豈有不說者乎天下所以隨之凡隨時者必元亨利貞乃无咎也象曰澤中有雷隨君子以嚮晦入宴息澤中之雷無聲之雷春動而秋歛時莫大焉嚮晦宴息隨莫大焉曰宴息則不宴之息非所以為息矣初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也官主也渝變也心有所隨官有渝也從正則吉出門交則有功出門不比于二陰而従四破私局而従正大也六二係小子失丈夫象曰係小子弗兼與也係初則失五故從正者當専一而無一毫私係也六三係丈夫失小子隨有求得利居貞象曰係丈夫志舍下也六三係四失初非應而比故亦曰係有求得居貞之戒九四隨有獲貞凶有孚在道以明何咎象曰隨有獲其義凶也有孚在道明功也以臣獲下雖正亦凶有孚在道者孚以道也以明者以其明也九五孚于嘉吉象曰孚于嘉位正中也隨道之吉惟隨善而已如五之于二是也上六拘係之乃従維之王用亨于西山象曰拘係之上窮也上窮則无所往守正而已拘係之又從維之固結而不可解守正之則也王之亨于岐山君堅于為民民堅于従君乃其象也巽上艮下蠱元亨利涉大川先甲三日後甲三日彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也剛上柔下上下不交下卑巽而上苟止故蠧積而為蠱蠱壞則修飭亂而復治元亨而天下治也蠱則无地非險治蠱則无􅉨非事甲事之始也一日二日三日思深慮逺先則善其所以始後則圖其所以終元亨而天下治者以此象曰山下有風蠱君子以振民育徳振民如風育徳如山初六幹父之蠱有子考无咎厲終吉象曰幹父之蠱意承考也貞者事之幹所謂正其本萬事理治蠱須正其本故曰幹子豈樂于改父意在承考也故有子則考无咎雖厲而終吉也九二幹母之蠱不可貞象曰幹母之蠱得中道也貞者盡其道也幹母之蠱豈能盡其道故不可貞者乃中道也九三幹父之蠱小有悔无大咎象曰幹父之蠱終无咎也九三過剛不中而巽體得正故有小悔而无大咎六四裕父之蠱往見吝象曰裕父之蠱往未得也蠱裕之則日深偷安于目前往而見其吝矣六五幹父之蠱用譽象曰幹父用譽承以徳也蠱者承其弊也蠱治則承其徳而有譽矣故幹蠱而曰傷厥考者道人于大不孝也上九不事王侯高尚其事象曰不事王侯志可則也高尚其事豈放情物外為高尚已哉正為天下第一等事如孟子居仁由義尚志之事故曰志可則也兌下坤上臨元亨利貞至于八月有凶象曰臨剛浸而長說而順剛中而應大亨以正天之道也至于八月有凶消不久也剛浸而長勢將遍及四陰陽和氣普遍大地說而順剛中而應豈非大亨以正天之道乎聖人于此已見八月之凶履霜之戒金柅之繫尚在一陰方長此則于二陽方進葢持盈思永全在幾先遲則无及故曰懼以終始其要无咎象曰澤上有地臨君子以教思无窮容保民无疆君子之臨民也教思無窮容保民無疆此臨之所以為大也初九咸臨貞吉象曰咸臨貞吉志行正也咸無心之感也陰陽相感是天地自然之理二陽在下四陰自然感動故初二皆曰咸臨正已物正如初之臨四則貞吉也九二咸臨吉无不利象曰咸臨吉无不利未順命也九二剛中而應一卦之主何吉如之如是又何不利之有无心之咸非順命也若欲順命則四陰方盛豈可得哉六三甘臨无攸利既憂之无咎象曰甘臨位不當也既憂之咎不長也甘則遂于情憂則復于性失己則无攸利守己則咎不長皆由己而已六四至臨无咎象曰至臨无咎位當也地澤之交至臨之象臨下之道也六五知臨大君之宜吉象曰大君之宜行中之謂也君之大知任賢而已如五之于二所謂知臨大君之宜上六敦臨吉无咎象曰敦臨之吉志在内也敦于二陽也尊而應卑高而從下吉又何咎也坤下巽上觀盥而不薦有孚顒若彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣九五卦主也故曰大觀在上順而巽中正以觀天下盥而不薦之時其象何如有孚顒若而已此所以下觀而化也神道者可默契而不可名言故於穆而四時行篤恭而天下平觀天之神道盡矣象曰風行地上觀先王以省方觀民設教先王省方觀民設教聖人身至而風行教豈煩乎哉初六童觀小人无咎君子吝象曰初六童觀小人道也以初觀五童觀而已小人之道如是足也曾是以為君子乎六二闚觀利女貞象曰闚觀女貞亦可醜也六二能順承于五觀則闚觀女子之貞丈夫之醜也六三觀我生進退象曰觀我生進退未失道也天地間莫非生也就人生而言動作威儀皆是六三觀我生順時而進退也六四觀國之光利用賔于王象曰觀國之光尚賔也六四光即生也觀天下者曰生下觀者曰光觀國之光其觀大矣必有可以賔于王者而後可尚也九五觀我生君子无咎象曰觀我生觀民也九五以天下為生故觀我生而曰觀民上九觀其生君子无咎象曰觀其生志未平也上九不得位而道在焉其生而君子則天下萬世所觀也道彌進而彌窮志彌虚而彌逺故曰未平震下離上噬嗑亨利用獄彖曰頤中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也噬嗑亨者噬而後合合而後亨也剛柔交濟威明並至柔中之主上居尊位故利用獄也象曰雷電噬嗑先王以明罰勑法罰者一時所用之法法者平時所定之罰雷電合章則明勑至矣初九屨校滅趾无咎象曰屨校滅趾不行也初上取明動之義誡于初則无咎至于上則无及故君子行已跬步不使妄行令小罪小惡根芽盡拔處己處人其道一也六二噬膚滅鼻无咎象曰噬膚滅鼻乗剛也以中正故有噬膚之易以乗剛故有滅鼻之深六三噬腊肉遇毒小吝无咎象曰遇毒位不當也小物全乾為腊居位不當故治人不治而于事无咎也九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也肉之連骨者曰胏胏而乾其堅至矣以剛直之才有堅貞之戒者爻非中正而未光也六五噬乾肉得黄金貞厲无咎象曰貞厲无咎得當也彖言不當位爻言得當惟不當位故貞厲而後得當也上九何校滅耳凶象曰何校滅耳聰不明也聰古聴字滅耳之凶其剛愎自用者乎六二至五皆頤中雖四為物而同噬噬嗑之義不及初上用獄之義則通于六爻離下艮上賁亨小利有攸往彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下離明艮止文明内藴天然本色不雜外飾故為賁賁之亨以剛而剛之亨以柔賁之攸往以剛而小利以柔剛柔往來交錯成文則天之文也人倫庻物各止其所則人之文也觀天文之變而時變可察矣觀人文之常而天下可化成矣象曰山下有火賁君子以明庻政无敢折獄止而明故以明庶政明而止故无敢折獄初九賁其趾舍車而徒象曰舍車而徒義弗乗也君子在下以守義為賁賁初者二舍二從四舍車而徒也趾取義于初車徒取義于趾也六二賁其須象曰賁其須與上興也剛得柔而文柔從剛而動賁其須則與上興也九三賁如濡如永貞吉象曰永貞之吉終莫之陵也三在兩柔之中故有濡如之賁有永貞之戒貞則莫之能陵何賁如之六四賁如皤如白馬翰如匪宼婚媾象曰六四當位疑也匪宼婚媾終无尤也剛柔相賁異而實同四之與初非宼而婚當位之疑疑所不當疑也六五賁于丘園束帛戔戔吝終吉象曰六五之吉有喜也賁五不言君位而言山林寒素之賁天下之至賁者不在富貴也上九白賁无咎象曰白賁无咎上得志也白賁還其初也故曰得志聖人所謂得志者如此可思矣坤下艮上剝不利有攸往彖曰剝剝也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虚天行也不利攸往君子觀順止之象也消息盈虚天行自然君子以此為尚故以順止為道也象曰山附于地剝上以厚下安宅山附于地下剝則上傾故厚下所以安宅大象不取隂剝陽取陽覆隂之義也初六剝牀以足蔑貞凶象曰剝牀以足以滅下也牀者身所安足者牀所安小人徒知蔑貞而不知自剝其牀足蔑貞之凶小人之凶也滅下則上危矣凢小人之貪欲剝民致四海困窮皆此象也六二剝牀以辨蔑貞凶象曰剝牀以辨未有與也牀幹曰辨牀之中介處二與上不相當不得與于君子益肆然无忌若使其見君子有開明之者豈至自蔑其貞凶一至此乎六三剝之无咎象曰剝之无咎失上下也六三應上而失羣隂在剝之時為无咎也六四剝牀以膚凶象曰剝牀以膚切近災也膚者床之膚凶者四之凶小人之使灾害並至危亡莫救此其象也六五貫魚以宫人寵无不利象曰以宫人寵終无尤也六五近陽故能貫四陰而承之如宫人受寵于君也上九碩果不食君子得輿小人剝廬象曰君子得輿民所載也小人剝廬終不可用也果為剝之貞反即復之元自上視之君子為五陰所載為輿自下視之小人為一陽所覆為廬然則小人剝陽寔自剝其廬此蔑貞所以為凶震下坤上復亨出入无疾朋來无咎反復其道七日來復利有攸往彖曰復亨剛反動而以順行是以出入无疾朋來无咎反覆其道七日來復天行也利有攸往剛長也復其見天地之心乎剛反而復復則亨矣出者剛之長入者剛之反出入无疾一陽動而順也朋來无咎五陰順而來也六反為一七日來復也天行原其始也剛長要其終也天地生物之心無一息間斷于復而見矣象曰雷在地中復先王以至日閉闗商旅不行后不省方當安静以養微陽天地之氣然也國家之事然也人身之養然也初九不逺復无祇悔元吉象曰不逺之復以修身也復者復其情之未發即性也逺則祗于悔矣故不逺之復不祗悔而元吉六二休復吉象曰休復之吉以下仁也休則復矣復則仁矣二近初故取象于下仁寔聖人之示心法也六三頻復厲无咎象曰頻復之厲義无咎也非頻復之厲乃頻失之厲也復又何咎焉六四中行獨復象曰中行獨復以従道也行羣陰之中獨應于初道當如是不問凶吉也故聖人不言凶吉六五敦復无悔象曰敦復无悔中以自考也復之敦矣止于无悔者微陽之時柔而无助自成其中徳而已上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征象曰迷復之凶反君道也陰柔不中迷而不反其凶如此以行師之故致國君之凶人身亦然天君迷而事謬事謬則心益凶所謂反君道也震上乾下无妄元亨利貞其匪正有眚不利有攸往彖曰无妄剛自外來而為主于内動而徤剛中而應大亨以正天之命也其匪正有眚不利有攸往无妄之往何之矣天命不祐行矣哉言心法者莫備于无妄剛自外來天命也為主于内人心也人心即天命故動而徤剛中而應大亨以正也匪正則非命非命則有眚而不利有攸往然所謂匪正者不獨妄也无妄之往亦妄也无妄之往所謂无事生事如上九然天命不祐也可行乎哉象曰天下雷行物與無妄先王以茂對時育萬物天下雷行萬物化生也各正性命物與无妄也茂哉造化之功乎故有一物失所不為茂對不為育物對時者順時育物者因物而已初九无妄往吉象曰无妄之往得志也初九人心之本色如此而往適得其志也六二不耕穫不菑畬則利冇攸往象曰不耕穫未富也天下之望得莫如農之耕穫菑畬故不耕穫菑畬則无富之心而无咎也六三无妄之災或繫之牛行人之得邑人之災象曰行人得牛邑人災也无妄之災順受而已行人得牛邑人得災豈意之所及者乎九四可貞无咎象曰可貞无咎固有之也九四固有之心故可貞而无咎九五无妄之疾勿藥有喜象曰无妄之藥不可試也九五无妄者也雖疾而勿藥則有喜上九无妄行有眚无攸利象曰无妄之行窮之災也上九无妄者也窮而行斯災矣六爻皆无妄而戒其妄者則于二陰二應人心之妄皆陰也乾下艮上大畜利貞不家食吉利涉大川彖曰大畜剛健篤實輝光日新其徳剛上而尚賢能止健大正也不家食吉養賢也利涉大川應乎天也大畜大涵養也乾之剛健艮之篤實輝光健進而止于天理當然之極其徳日新而无窮故為大畜剛居五上而尚賢能止天下之至健非大正者不能也有天下之大抱負者當有天下之大設施以利濟天下之險難故不家食吉而利涉大川以應乎天行也象曰天在山中大畜君子以多識前言往行以畜其徳何莫非天也山之中天在焉若山畜之人心多識前言往行所謂𢎞于天而徳之畜也大矣初九有厲利己象曰有厲利己不犯災也乾之止止于天理也越理則犯災初不中知其有厲而己之則利也九二輿說輹象曰輿說輹中无尤也二中故自說其輹而无尤九三良馬逐利艱貞曰閑輿衞利有攸往象曰利有攸往上合志也三與上合志畜而通者也雖良馬之逐當思其艱而守于正又自警戒曰其閑我輿衞乎恐跬步之越于矩也如是則利有攸往矣六四童牛之牿元吉象曰六四元吉有喜也六四之止如童牛加牿禁于未發之謂豫何吉如之六五豶豕之牙吉象曰六五之吉有慶也六五之止如去勢之豶豕又加以繫豕之牙則制事制心有道天下受其慶矣上九何天之衢亨象曰何天之衢道大行也何者驚喜之詞何天之衢乃如是乎所謂一旦豁然也震上艮下頤貞吉觀頤自求口實彖曰頤貞吉養正則吉也觀頤觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頤之時大矣哉頤貞吉養人自養以正則吉觀其所養養賢則貞吉也口實而曰自求則人人有自養者舍己求人可乎象曰山下有雷頤君子以慎言語節飲食頤口也以動而止為其道慎言語節飲食聖人之頤貞如此初九舍爾靈龜觀我朶頤凶象曰觀我朶頤亦不足貴也初九不能自求口實而求諸人者故借所求者謂之曰舍爾靈龜乃觀我朶頤乎欲食而頤動可鄙甚矣葢在上者道在養人在下者當有以自養也六二顛頤拂經於丘頤征凶象曰六二征凶行失類也六二无應求于初則為顛頤拂經求于上則為丘頤征凶皆非其類也六三拂頤貞凶十年勿用无攸利象曰十年勿用道大悖也不中正而處動極拂頤之貞矣一失道而十年无攸利口之于人可畏哉六四顛頤吉虎視躭躭其欲逐逐无咎象曰顛頤之吉上施光也六四養人者也故顛頤則吉躭躭下視逐逐无厭則周悉人情繼續不匱上施之道如是乃光六五拂經居貞吉不可涉大川象曰居貞之吉順以従上也六五賴養于上故曰拂經然以順從上為居貞之吉者所從者正也其才豈可以濟險乎上九由頤厲吉利涉大川象曰由頤厲吉大有慶也天下由之以養雖厲而吉利涉大川者大有為之才得大有為之慶巽下兊上大過棟橈利有攸往亨彖曰大過大者過也棟橈本末弱也剛過而中巽而說行利有攸往乃亨大過之時大矣哉大過以四陽言謂大者過也非聖人有過以大過之時聖人為大過人之事非古今所經見正義理所當然而人見為大過也四陽為棟本末弱而橈剛雖過而二五中行之以巽而說必利有攸往乃亨大過之時非大有為不亨也象曰澤滅木大過君子以獨立不懼遯世无悶獨立不懼遯世无悶非大過人者能之乎故知大過非過中之過也初六藉用白茅无咎象曰藉用白茅柔在下也人心宜下下之至如藉用白茅之慎又何失之有九二枯楊生稊老夫得其女妻无不利象曰老夫女妻過以相與也生意在根為稊二五以比初上而有女妻老媍之象非以巽兊為長少也九三棟橈凶象曰棟橈之凶不可以有輔也九三居下之上上實而下弱弱則上傾故曰棟橈九四棟隆吉有它吝象曰棟隆之吉不橈乎下也九四居上之下上弱而下實下實則可載故曰棟隆以應初有他吝之象九五枯楊生華老婦得其士夫无咎无譽象曰枯楊生華何可久也老婦士夫亦可醜也巽者春生兊者秋殺故下為女妻上為老婦上六過涉滅頂凶无咎象曰過涉之凶不可咎也楊敬仲曰見危授命而功不濟亦有従而議其後者則鄉原之見利忘義者得志矣過涉之凶豈可咎乎坎下坎上習坎有孚維心亨行有尚彖曰習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用太矣哉坎而又坎重險之象有孚維心乃亨有孚如水之不失其信維心如水之行而不息如是則行有尚矣此濟險之道刀鋸鼎鑊在前貞心不易處之泰然非獨危而即安為往有功即殺身成仁亦往有功也時用者有時而用王公設險以守其國君子設險以守其身正衣冠尊瞻視望而畏焉何險如之象曰水洊至習坎君子以常徳行習教事水洊至則習于坎志洊新則篤于道徳行以之常教事以之習也初六習坎入于坎窞凶象曰習坎入坎失道凶也水以行而出陷以入而陷險故入窞而失道也九二坎有險求小得象曰求小得未出中也九二雖中下坎未出小得而不成大功也六三來之坎坎險且枕入于坎窞勿用象曰來之坎坎終无功也兩坎之間往來皆坎故枕于陷而入于窞也六四樽酒簋貳用缶納約自牖終无咎象曰樽酒簋貳剛柔際也人心之陷溺者非孚誠相輸自明而入不能出之于陷也一樽之酒二簋之食瓦缶之器納此款款之約于君所開明之牖必際合矣九五坎不盈祗既平无咎象曰坎不盈中未大也水不盈科不行既平而後出于坎也陽陷陰中故中未大上六繫用徽纆寘于叢棘三嵗不得凶象曰上六失道凶三嵗也人心之陷如徽纆之係叢棘之寘三嵗不得則不得矣聖人覺之曰何以如是失道云爾孰知係者自係寘者自寘三嵗不得一朝得之曾莫之禦乎初云失道拯之于始上云失道拯之于終聖人以斯道覺斯民也如是夫離下離上離利貞亨畜牝牛吉彖曰離麗也日月麗乎天百穀草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也火必麗于物始見故火為離重明以麗乎正以四剛言柔麗乎中正以二柔言剛之能麗乎正正以柔之能麗乎中牝牛至柔麗中正者非至柔至順不能故畜牝牛吉也象曰明兩作離大人以繼明照於四方兩作者明而又明以不息之明照于四方故曰繼明初九履錯然敬之无咎象曰履錯之敬以辟咎也履錯然而動矣吉凶悔吝由兹出也可不敬乎六二黄離元吉象曰黄離元吉得中道也人心真明乃黄離也故曰得中道加意焉非黄離矣九三日昃之離不鼓缶而歌則大耋之嗟凶象曰日昃之離何可久也常明之明无昃也若夫日昃之離寧可久乎故不鼓缶而歌則大耋之嗟也九四突如其來如焚如死如棄如象曰突如其來如无所容也兩離相繼上炎躁進突如其來如赴火之蛾有焚死棄而已故犯突如之象者皆无所容于世而入于死道者也六五出涕沱若戚嗟若吉象曰六五之吉離王公也惟其明也故憂民如此沱與嗟皆至明至虚中流出至不容己之情此之謂王公上九王用出征有嘉折首獲匪其醜无咎象曰王用出征以正邦也如上九剛明而後可行師故能折首不獲其醜有嘉而无咎也周易易簡說卷一
