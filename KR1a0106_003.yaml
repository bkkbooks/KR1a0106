body:
  text: 周易易簡説卷三明高攀龍撰繫辭上傳天尊地卑乾坤定矣卑高以陳貴賤位矣動靜有常剛柔斷矣方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣是故剛柔相摩八卦相蕩鼓之以雷霆潤之以風雨日月運行一寒一暑乾道成男坤道成女乾知大始坤作成物乾以易知坤以簡能易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業易簡而天下之理得矣天下之理得而成位乎其中矣此夫子首明易之所以為易也夫易者何物也現前之物也乾坤非他天地之尊卑是矣貴賤非他天地之高卑是矣剛柔非他天地之動靜是矣吉凶非他天地間同方而類聚各物而羣分者是矣變化非他天地之成象成形者是矣洋洋乎觸目而是者孰非剛柔相摩八卦相蕩邪雷霆之鼓風雨之潤日月寒暑之運行成男成女之人物皆乾之所始坤之所成而乾之知始何其易也坤之成能何其簡也不易不簡非道也賢人可久之德可大之業莫非天地自然之理天下易知而易從故有親而有功也易簡而天下之理得三才之位參矣此所謂易也右第一章聖人設卦觀象繫辭焉而明吉凶剛柔相推而生變化是故吉凶者失得之象也悔吝者憂虞之象也變化者進退之象也剛柔者晝夜之象也六爻之動三極之道也是故君子所居而安者易之序也所樂而玩者爻之辭也是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉無不利聖人明於三極之道吉凶變化之決然而不易者欲揭以示人故設為之卦挂以示之觀其象而繫之辭以明吉凶焉六爻剛柔相推而生變化焉故人事有得失示以吉凶之象人事有憂虞示以悔吝之象變化者象進退也剛柔者象晝夜也六爻之動盡三極之道矣易之序有其時有其位不可亂也故君子居而安之爻之辭陳其理著其戒不可悖也故君子樂而玩之居則因象而玩其辭動則因變而玩其占故動與吉會不涉凶途順天之道而自天祐之矣右第二章彖者言乎象者也爻者言乎變者也吉凶者言乎其失得也悔吝者言乎其小疵也無咎者善補過也是故列貴賤者存乎位齊小大者存乎卦辨吉凶者存乎辭憂悔吝者存乎介震無咎者存乎悔是故卦有小大辭有險易辭也者各指其所之彖言一卦之象爻言人事之變事有失得而言吉凶事有小疵而言悔吝善補過而言無咎觀爻之上下而貴賤之位列矣觀卦之陰陽而小大之象定矣觀辭之吉凶而得失之辨明矣悔吝者所由以入于吉凶者也憂之則當嚴其介無咎者由有咎而無之者也善補則當震其悔以卦有小大故辭有險易指人以所之而使人不迷于所往也右第三章易與天地準故能彌綸天地之道仰以觀于天文俯以察于地理是故知幽明之故原始反終故知死生之説精氣為物遊魂為變是故知鬼神之情狀與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神無方而易無體聖人作易與天地相準天地之道大無不包者充周而無外細無不入者密察而不遺聖人準則之而彌綸其道也仰觀天文俯察地理可見者為明不可見者為幽明者易之呈于有象幽者易之藏于無朕幽明之故何以知之以易知之也原人之始而知其始于易反人之終而知其終于易死生之説易一陰一陽之説也精氣則物成其形魂遊則物變其故鬼神之狀易一屈一伸之情狀也惟其準天地故天地與相似惟其似天地故天地不能違以此為知故知周萬物以此為道故道濟天下無所不遍而不過無所不行而不流樂此之謂樂天知此之謂知命順天之命而居易也夫何憂焉安此之謂安土敦此之謂敦仁因地之宜而厚載也何不愛焉夫豈惟與天地相似天地無心而成化此實範圍之使不過也萬物並育于天地此實曲成之而不遺也晝夜代謝于吾前此實通晝夜之道而常知也何者神無方所易無形體大無不包也小無不入也聖人似天地之道者即準天地之道也右第四章一陰一陽之謂道繼之者善也成之者性也仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣顯諸仁藏諸用鼓萬物而不與聖人同憂盛德大業至矣哉富有之謂大業日新之謂盛德生生之謂易成象之謂乾效法之謂坤極數知來之謂占通變之謂事陰陽不測之謂神夫易陰陽而已矣一陰一陽之謂道也一陰一陽相繼而不已者善之流行也一陰一陽生物而成形者性之各正也仁者見此則謂之仁知者見此則謂之知百姓亦日用之而不知也故君子之道民鮮能之而道豈難知哉目前森羅萬象皆是也顯而可見者即不可見之仁顯不顯于可見而顯諸仁藏而不可見者即可見之用藏不藏于不可見而藏諸用鼓動萬物如聖人之日見于世特不同其憂世之心運而無迹尸而不宰盛德大業日新富有生生而無盡生生者之謂易也道無象乾則確然而成象乾無為坤則隤然而效法效法者順承乾而若效法之謂之占者極此之數而可知來也謂之事者通此之變而使不窮也謂之神者陰陽兩在而不測也百姓出入于其中而日用之道豈難知哉右第五章夫易廣矣大矣以言乎逺則不禦以言乎邇則靜而正以言乎天地之間則備矣夫乾其靜也専其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉廣大配天地變通配四時陰陽之義配日月易簡之善配至德夫此生生之體廣矣大矣逺不可禦邇靜而正天地間物物皆是也大者大生也乾靜専而動直是以大生廣者廣生也坤靜翕而動闢是以廣生此之廣大與天地配此之變通與四時配此陰陽之義與日月配此易簡之善與天地之至德配謂之配者其為物不二也故善學易者觀天地則知吾心人心之靜而正者即逺不禦者也右第六章子曰易其至矣乎夫易聖人所以崇德而廣業也知崇禮卑崇效天卑法地天地設位而易行乎其中矣成性存存道義之門聖人之德業盡之于易矣上達之知如天之崇下學之禮如地之卑知禮成性而道義出猶之乎天地設位而易行也成性者性本成必知禮以為德業則本成之性存存不息而所發者皆道義矣萬物統體一天地知禮自成一天地人心之易與天地之易始配合無間故曰人心即易而未易言也右第七章聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻言天下之至賾而不可惡也言天下之至動而不可亂也擬之而後言議之而後動擬議以成其變化鳴鶴在陰其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之況其邇者乎居其室出其言不善則千里之外違之況其邇者乎言出乎身加乎民行發乎邇見乎遠言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎同人先號咷而後笑子曰君子之道或出或處或默或語二人同心其利斷金同心之言其臭如蘭初六藉用白茅無咎子曰苟錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以往其無所失矣勞謙君子有終吉子曰勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也亢龍有悔子曰貴而無位高而無民賢人在下位而無輔是以動而有悔也不出户庭無咎子曰亂之所生也則言語以為階君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也子曰作易者其知盜乎易曰負且乘致寇至負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫易曰負且乘致寇至盜之招也天下之事至賾也以聖人見之皆易也設卦以象之言其至賾而不可惡也天下之動至亂也以聖人見之皆道也為之觀其會通之不可泥者以行其典禮之不可易者如是則吉如是則凶言其至動而不可亂也故卦爻之示人者使人慎于言動而已擬其當然而後言議其當然而後動擬議者皆觀會通以行典禮而成其變化也是故中孚之孚天下者言行也如同心之言則其臭如蘭如藉茅之慎則無所失如勞謙之以功下人則不至亢龍之動而有悔不然言語鮮不階亂而負乘鮮不招盜矣聖人之象其物宜而斷其吉凶者如此以此擬議而變化成言動其無所失矣乎右第八章天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也大衍之數五十其用四十有九分而為二以象兩挂一以象三揲之以四以象四時歸竒于扐以象閏五嵗再閏故再扐而後挂乾之策二百一十有六坤之策百四十有四凡三百有六十當期之日二篇之策萬有一千五百二十當萬物之數也是故四營而成易十有八變而成卦八卦而小成引而伸之觸類而長之天下之能事畢矣顯道神德行是故可與酬酢可與佑神矣子曰知變化之道者其知神之所為乎易主占此占法也所謂極數者極此數也天地五竒五偶積之為五十有五成變化者成卦爻之變化行鬼神者行鬼神之酬酢故揲蓍得卦顯陰陽之道神德行之用可與鬼神相酬酢而佑助造化之神功是知變化之道皆神之所為非人所能為也右第九章易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占是以君子將有為也將有行也問言而以言其受命也如響無有逺近幽深遂知來物非天下之至精其孰能與於此參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與於此易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此夫易聖人之所以極深而研幾也惟深也故能通天下之志惟幾也故能成天下之務惟神也故能不疾而速不行而至子曰易有聖人之道四焉者此之謂也易有聖人之道四焉聖人之用易有四也占則在辭中變則在象中皆蓍卦之法也參而伍之以通其變則成六爻剛柔相錯之文錯而綜之以極其數則定一卦內外兩體之象變者分二挂一揲四歸餘再扐之變參伍者爻之參揲而伍變也數者七八九六之數錯綜者卦之往來上下也無思無為寂然感通則易之體用也精則能極深而通天下之志變則能研幾而成天下之務神則不知其所以然而然聖人尚此四者以用易也右第十章子曰夫易何為者也夫易開物成務冒天下之道如斯而已者也是故聖人以通天下之志以定天下之業以斷天下之疑是故蓍之德圓而神卦之德方以知六爻之義易以貢聖人以此洗心退藏于密吉凶與民同患神以知來知以藏往其孰能與於此哉古之聰明睿知神武而不殺者夫是以明于天之道而察于民之故是興神物以前民用聖人以此齋戒以神明其德夫是故闔户謂之坤闢户謂之乾一闔一闢謂之變往來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神是故易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業是故法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月崇高莫大乎富貴備物致用立成器以為天下利莫大乎聖人探賾索隱鈎深致逺以定天下之吉凶成天下之亹亹者莫大乎蓍龜是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也易者開物成務盡冒天下之道而其用則以通天下之志成天下之業斷天下之疑是故蓍圓而神以知來卦方以知以藏往六爻變易以貢其義貢者顯呈之也聖人之心純乎易也故曰以此洗心密者無朕也退藏於密則寂然不動吉凶與民同患則感而遂通古之聰明睿知神武不殺者羲皇也明於天之道察於民之故興此神物開民之先聖人則以此齋戒而通其德于神明也是故乾坤為易之門坤者闔户之謂乾者闢户之謂變者一闔一闢之謂通者往來不窮之謂凡可見者皆謂之象有形者皆謂之器可用者皆謂之法百姓之利用出入皆神也是皆易也而易有太極所以生兩儀四象八卦以定吉凶生大業也蓋三才自然之理不假絲毫智力而成故天地法象四時變通日月著明富貴崇高有莫大焉者矣而備物致用立成器以為天下利者孰有大於聖人乎探賾索隱鈎深致逺定天下吉凶之疑成天下亹亹之業者孰有大於蓍龜乎是天生之神物也聖人則此神物以用易而效天地之變化象天象之吉凶則圖書之呈數所以示之象告之辭斷之吉凶者何莫非因其自然而作法以利天下耶易之所以開物成務冒天下之道者如此矣右第十一章易曰自天祐之吉無不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利也子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情偽繫辭焉以盡其言變而通之以盡利鼓之舞之以盡神乾坤其易之緼邪乾坤成列而易立乎其中矣乾坤毁則無以見易易不可見則乾坤或幾乎息矣是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而措之天下之民謂之事業是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻極天下之賾者存乎卦鼓天下之動者存乎辭化而裁之存乎變推而行之存乎通神而明之存乎其人默而成之不言而信存乎德行舉大有上爻見書不盡言言不盡意然聖人之意以象而盡天下之情偽以卦而盡聖人之言以繫辭而盡又以六爻變易決其當從當違者以盡利而鼓舞天下使亹亹不倦而盡神也故易之蘊蓄乾坤兩畫盡之兩卦成列而易立乎其中兩不立則一不可見一不可見則兩之用息故曰乾坤毁則無以見易易不可見則乾坤或幾乎息也乾坤陰陽也陰陽亦器也形而上者謂之道形而下者謂之器即器為道故即形而上下之蓋即易為太極非太極在易之先也道在故妙於變通化而裁之使不過謂之變推而行之使不窮謂之通變通則舉而措之天下之民為事業矣存乎者全藉乎此也卦藉以極天下之賾辭藉以鼓天下之動變則藉以化裁通則藉以推行至於神明於幾微之妙者全藉乎人默成其不測之用於言意之外者全藉乎人之德行也右第十二章繫辭下傳八卦成列象在其中矣因而重之爻在其中矣剛柔相推變在其中矣繫辭焉而命之動在其中矣吉凶悔吝者生乎動者也剛柔者立本者也變通者趣時者也吉凶者貞勝者也天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也夫乾確然示人易矣夫坤隤然示人簡矣爻也者效此者也象也者像此者也爻象動乎內吉凶見乎外功業見乎變聖人之情見乎辭天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義八卦成列而萬物之象無不備以八卦而重之於是乎有六爻六爻剛柔相推於是乎有變變者因天下之動聖人因天下之動而繫辭以命之吉凶悔吝皆生乎動也故易以剛柔為本剛柔以變通而趨時吉凶何常之有不入於吉則入於凶常相勝而存乎人之趨吉以勝凶也何以貞勝之觀天地之道不貞觀乎日月之道不貞明乎天下之動貞夫一貞夫一而動無不吉矣豈難能哉夫乾確然示人易矣夫坤隤然示人簡矣萬古此易簡萬古此貞觀爻效此而為爻象像此而為象如此則吉不如此則凶爻象動乎蓍卦之內吉凶見乎事為之外功業即此變動而見聖人之情即此繫辭而見神而明之存乎人而已右第一章古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情作結繩而為網罟以佃以漁蓋取諸離包犧氏沒神農氏作斫木為耜揉木為耒耒耨之利以教天下蓋取諸益日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑神農氏沒黃帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久是以自天祐之吉無不利黃帝堯舜垂衣裳而天下治蓋取諸乾坤刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下蓋取諸渙服牛乘馬引重致逺以利天下蓋取諸隨重門擊柝以待暴客蓋取諸豫斫木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過弦木為弧剡木為矢弧矢之利以威天下蓋取諸暌上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺槨蓋取諸大過上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬天地之大德生而已矣聖人體天地之大德生天地所生之人故以位為大寶以仁而守位以財而聚人理其財正其辭禁其為非是乃義也古之聖王莫不以之包犧氏之王天下仰觀俯觀近取逺取而知神明之德萬物之情始作八卦以通其德類其情因尚象制器取離而為網罟以佃漁也神農則取益為耒耜取噬嗑為日中之市黃帝堯舜蓋通變宜民取乾坤為衣裳取渙為舟楫取隨為服乘牛馬取豫為豫備暴客取小過為臼杵取暌為弧矢取大壯為宫室取大過為棺槨取夬為書契莫非易也易者生而已矣右第二章是故易者象也象也者像也彖者材也爻也者效天下之動者也是故吉凶生而悔吝著也觀聖人之取諸易者是故易者象也象者像也彖則言一卦之材爻則效天下之動吉凶悔吝紛然不一爻則視效之故吉凶生而悔吝著使人知之而善其動也右第三章陽卦多陰陰卦多陽其故何也陽卦竒陰卦偶其德行何也陽一君而二民君子之道也陰二君而一民小人之道也天地之道陽尊而陰卑故陽君而陰民陽為主則為君子之道陰為主則為小人之道陰陽者天地之道扶陽抑陰者聖人所以彌綸天地之道也右第四章易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊途一致而百慮天下何思何慮日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而嵗成焉往者屈也來者信也屈信相感而利生焉尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也過此以往未之或知也窮神知化德之盛也易曰困于石據于蒺藜入于其宫不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見邪易曰公用射隼于高墉之上獲之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而動者也子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾無咎此之謂也善不積不足以成名惡不積不足以滅身小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可掩罪大而不可解易曰荷校滅耳凶子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑子曰德薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也子曰知幾其神乎君子上交不諂下交不瀆其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知微知彰知柔知剛萬夫之望子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復無祇悔元吉天地絪蘊萬物化醇男女構精萬物化生易曰三人行則損一人一人行則得其友言致一也子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也無交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恆凶夫易日用之常道也聖人舉十爻之最切要者推而明之舉咸之九四以明人之思慮也曰天下果何所思何所慮乎本同歸也人自殊途耳本一致也人自百慮耳往來者何為邪日月往來則得代明寒暑往來則成嵗功往來於吾前者如斯矣往則屈而來則伸屈伸相感則利生屈非不善也尺蠖之屈以求伸龍蛇之蟄可存身君子明乎屈伸往來之道惟求諸同歸一致之理精義焉而巳矣精義入神則足以逄源而致用利用安身則足以立本而崇德過此以往未之或知窮神知化德盛致然非思慮之所及也而憧憧者何為乎故學不明於易簡之善未有不入於憧憧者欲強遏之不可得也舉困之六三以明小人之困君子也曰非所當困而欲困其人徒辱爾名矣非所當據而欲據其位徒危爾身矣辱且危危且死妻且不可得而見奈何自作此不祥也邪舉解之上六以明君子之解小人也曰隼則集于高墉矣君子射隼于高墉非漫為也有其器器則成矣有其時動不括矣是以出而有獲也萬舉而一不當豈所以解哉舉噬嗑之初九以明君子之懲小人者乃福小人也舉噬嗑之上九以明小人之積小惡卒至於蒙大禍也舉否之九五以明君子凛乎如危亡喪亂之在前者乃所以安身而保國也舉鼎之九四以明小人之肆然居尊謀大任重者乃所以自及於禍也舉豫之六二以明君子知幾則上交下交不諂不瀆為萬夫望矣非如石之介何以識不終日之斷乎舉復之初九以明顔子之復復於幾先易之所謂不逺復者如此也舉損之六三以明天地致一之道一不獨行三必損一兩立則一行為物不二故生物不測也舉益之上九以明君子安其身易其心定其交民斯與之所以求諸民者無不本諸己也皆精義致用之事君子之所以用易者思過半矣右第五章子曰乾坤其易之門邪乾陽物也坤陰物也陰陽合德而剛柔有體以體天地之撰以通神明之德其稱名也雜而不越於稽其類其衰世之意邪夫易彰往而察來而微顯闡幽開而當名辨物正言斷辭則備矣其稱名也小其取類也大其旨逺其辭文其言曲而中其事肆而隱因二以濟民行乾坤兩畫一陰一陽為易之門雖陰陽合德而剛柔有體所以體天地之事通神明之德者以此而已其稱名雜而不越此二者稽其類則皆物之情偽而衰世之意也彰著其往者察知其來者微其顯者使人見事之幾微闡其幽者使人見理之實象開示而當其名其物甚辨其言甚正其辭甚斷無所不備也稱名於物象之小取類於陰陽之大辭不徒斷而旨逺辭文言不徒正又曲而中物不徒辨又肆陳而隱因民心之疑二決之而濟其行以明失得之報有吉凶之應而不易也所以體天地之撰通神明之德者如此右第六章易之興也其於中古乎作易者其有憂患乎是故履德之基也謙德之柄也復德之本也恆德之固也損德之修也益德之裕也困德之辨也井德之地也巽德之制也履和而至謙尊而光復小而辨於物恆雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷巽稱而隱履以和行謙以制禮復以自知恆以一德損以逺害益以興利困以寡怨井以辨義巽以行權去古漸逺世風日下聖人憂患後世而作易也豈獨因二以濟民行哉所以成其德行也是故非履則德無基以立非謙則德無柄以持非復則不能還其初而德無本非恆則不能貞其守而德不固非損則有以損德者而德不修非益則無以益德者而德不裕非困則無以驗其力而德不辨非井則不能安其正而德無地非巽則不能以入其微觀其變而德無制也履和説而懇至謙自卑而尊光復入微而物辨恆當紛雜而有常損欲先難而習熟則易益但充長而不造作困窮於遇而心亨井居其所而及物巽稱物之宜而隱其用於無迹也履上下有定而行和謙德盛禮恭而制禮復復於性以自知恆恆其心以一德損以逺欲之害益以興善之利困不得於人而不尤井不遷其止而不惑巽以通變行權得時措之宜也右第七章易之為書也不可逺為道也屢遷變動不居周流六虛上下無常剛柔相易不可為典要惟變所適其出入以度外內使知懼又明於憂患與故無有師保如臨父母初率其辭而揆其方既有典常苟非其人道不虛行易之為書也不可逺而求之不可泥而求之天下事變無常故易道屢遷而不居周流六虛初無定位往來而為上下相易而互剛柔惟變之適其宜者以為典要不可執以為典要也出為外卦入為內卦有其卦則有其爻有其爻則有其位尊卑貴賤確乎其有度也悔吝憂虞凜乎其可懼也明於憂患之故如師保父母臨之欲不懼而不可得矣率循其所告之辭揆度其所向之道若有典常之可據苟非其人不能神而明之以行道也右第八章易之為書也原始要終以為質也六爻相雜唯其時物也其初難知其上易知本末也初辭擬之卒成之終若夫雜物撰德辨是與非則非其中爻不備噫亦要存亡吉凶則居可知矣知者觀其彖辭則思過半矣二與四同功而異位其善不同二多譽四多懼近也柔之為道不利逺者其要無咎其用柔中也三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝邪一卦以六爻為始終六爻惟時物之相雜夫時者卦之時物者爻之位原其始則難知要其終則易知初為本難定其所向必辭擬之而後知上為末成一卦之所終故易知也雜物者雜八卦之物撰德者撰八卦之德是非者時物之是非皆於中爻備之彖辭言一卦存亡吉凶皆於中爻定之故觀中爻則一卦居然可知觀彖辭則六爻思亦過半矣二與四皆陰而同功然位不同善亦不同二多譽以中也四多懼近君也柔不利逺要於無咎其用柔中而去剛中者逺矣三與五皆陽而同功以位不同故三居臣位而多凶五居尊位而多功柔居之則危剛居之則力能勝也一卦之始終皆隨六爻之時物類如此右第九章易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉易書之廣大以三才之道無不備也下二爻為地中二爻為人上二爻為天故曰兼三才而兩之才猶才能三極不同其才同也故曰三才之道道有變動爻以效其動爻有逺近貴賤之不同故值其位為物如大射有耦立之物也物有剛柔之相雜故文文不當者陰陽之不當其位也右第十章易之興也其當殷之末世周之盛德邪當文王與紂之事邪是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要無咎此之謂易之道也危懼則無不安平慢易則無不覆傾惟懼而後得無咎此易道之要領也右第十一章夫乾天下之至健也德行恆易以知險夫坤天下之至順也德行恆簡以知阻能説諸心能研諸侯之慮定天下之吉凶成天下之亹亹者是故變化云為吉事有祥象事知器占事知來天地設位聖人成能人謀鬼謀百姓與能八卦以象告爻彖以情言剛柔雜居而吉凶可見矣變動以利言吉凶以情遷是故愛惡相攻而吉凶生逺近相取而悔吝生情偽相感而利害生凡易之情近而不相得則凶或害之悔且吝將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭遊失其守者其辭屈乾坤者六十四卦陰陽之畫德行者乾坤之德行不易則險不簡則阻險阻者皆人為之私非自然之道故乾至健恆易以知險坤至順恆簡以知阻也人心無險阻則説而能慮明於吉凶之故而成亹亹之事業是故變化於云為之間事之吉者知其有祥象則知其器占則知其來天地設位聖人以易成其能人謀鬼謀雖百姓亦與其能也六十四卦則以象告六十四卦之爻辭則以情言剛柔雜居當位與不當位而吉凶見矣易之變動欲人行其所利如利貞之類而有吉有凶者皆以情遷也故有愛惡相攻逺近相取情偽相感之不同吉凶悔吝利害紛然不一矣蓋易之情近而不相得則有凶者有害者有悔且吝者皆以情遷也聖人之情見乎辭如將叛者之類有其情則見於辭不可掩也觀於辭而聖人之情見矣右第十二章説卦傳昔者聖人之作易也幽贊於神明而生蓍參天兩地而倚數觀變於陰陽而立卦發揮於剛柔而生爻和順於道德而理於義窮理盡性以至於命聖人作易幽贊神明之用始生揲蓍之法以天三地二倚之以起數故大衍之數五十也卦者陰陽之變爻者剛柔之推立卦生爻繫之以辭欲人和順於道德而條理於義窮理盡性以至於命也右第一章昔者聖人之作易也將以順性命之理是以立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分陰分陽迭用柔剛故易六位而成章易以順性命之理在天為陰陽在地為剛柔在人為仁義易之六畫天地人之道也易以順天地人之道而已矣右第二章天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆是故易逆數也此伏羲先天之位所謂數往者順也至八卦相錯而為六十四卦則以蓍而成所謂知來者逆也易之數皆以知來故曰逆數也前不云乎蓍之德圓而神神以知來卦之德方以知知以藏往往來之至義明矣右第三章雷以動之風以散之雨以潤之日以烜之艮以止之兊以説之乾以君之坤以藏之雷風相薄一以動之一以散之水火不相射一以潤之一以烜之山澤通氣一以止之一以説之天地定位一以君之一以藏之天地之定體定用也右第四章帝出乎震齊乎巽相見乎離致役乎坤説言乎兊戰乎乾勞乎坎成言乎艮萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南面而聽天下嚮明而治蓋取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兊正秋也萬物之所説也故曰説言乎兊戰乎乾乾西北之卦也言陰陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮此文王後天卦也八方之位四時之序萬物之出入莫不由之右第五章神也者妙萬物而為言者也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火説萬物者莫説乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也帝神之主也神妙萬物變化萬物而成之故先天立法象之體則後天為流行之用後天立時位之體則先天為神化之用莫非易也故曰天地設位而易行乎其中矣右第六章乾健也坤順也震動也巽入也坎陷也離麗也艮止也兊説也乾健也凡健皆乾坤順也凡順皆坤八者盡萬物之性情右第七章乾為馬坤為牛震為龍巽為雞坎為豕離為雉艮為狗兊為羊逺取諸物則八卦為八物右第八章乾為首坤為腹震為足巽為股坎為耳離為目艮為手兊為口近取諸身則一身為八卦右第九章乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兊三索而得女故謂之少女八卦定而父母男女合上天下地而成一家一家之中又分父母男女而自成八卦三才之義豈不重乎右第十章乾為天為圜為君為父為玉為金為寒為冰為大赤為良馬為老馬為瘠馬為駁馬為木果坤為地為母為布為釡為吝嗇為均為子母牛為大輿為文為衆為柄其於地也為黑震為雷為龍為玄黃為敷為大塗為長子為決躁為蒼筤竹為萑葦其於馬也為善鳴為馵足為作足為的顙其於稼也為反生其究為健為蕃鮮巽為木為風為長女為繩直為工為白為長為高為進退為不果為臭其於人也為寡髮為廣顙為多白眼為近利市三倍其究為躁卦坎為水為溝瀆為隱伏為矯輮為弓輪其於人也為加憂為心病為耳痛為血卦為赤其於馬也為美脊為亟心為下首為薄蹄為曳其於輿也為多眚為通為月為盜其於木也為堅多心離為火為日為電為中女為甲胄為戈兵其於人也為大腹為乾卦為鱉為蟹為螺為蚌為龜其於木也為科上稿艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為鼠為黔喙之屬其於木也為堅多節兊為澤為少女為巫為口舌為毁折為附決其於地也為剛鹵為妾為羊以言乎天地之間則備矣乾為馬須知馬為乾坤為牛須知牛為坤至於龜鱉螺蚌之微狗鼠黔喙之屬皆為離為艮常人見其為物聖人見其為易故曰易者非他現前之物也然而不識易徒見物之為易又非易也神而明之存乎其人右第十一章序卦傳有天地然後萬物生焉盈天地之間者惟萬物故受之以屯屯者盈也屯者物之始生也物生必蒙故受之以蒙蒙者蒙也物之稚也物稚不可不養也故受之以需需者飲食之道也飲食必有訟故受之以訟訟必有衆起故受之以師師者衆也衆必有所比故受之以比比者比也比必有所畜故受之以小畜物畜然後有禮故受之以履履而泰然後安故受之以泰泰者通也物不可以終通故受之以否物不可以終否故受之以同人與人同者物必歸焉故受之以大有有大者不可以盈故受之以謙有大而能謙必豫故受之以豫豫必有隨故受之以隨以喜隨人者必有事故受之以蠱蠱者事也有事而後可大故受之以臨臨者大也物大然後可觀故受之以觀可觀然後有所合故受之以噬嗑嗑者合也物不可以苟合而已故受之以賁賁者飾也致飾然後亨則盡矣故受之以剝剝者剝也物不可以終盡剝窮上反下故受之以復復則不妄矣故受之以無妄有無妄然後可畜故受之以大畜物畜然後可養故受之以頥頥者養也不養則不可動故受之以大過物不可以終過故受之以坎坎者陷也陷必有所麗故受之以離離者麗也有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯夫婦之道不可以不久也故受之以恆恆者久也物不可以久居其所故受之以遁遁者退也物不可以終遁故受之以大壯物不可以終壯故受之以晉晉者進也進必有所傷故受之以明夷夷者傷也傷於外者必反其家故受之以家人家道窮必乖故受之以暌暌者乖也乖必有難故受之以蹇蹇者難也物不可以終難故受之以解解者緩也緩必有所失故受之以損損而不巳必益故受之以益益而不已必決故受之以夬夬者決也決必有所遇故受之以姤姤者遇也物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升升而不已必困故受之以困困乎上者必反下故受之以井井道不可不革故受之以革革物者莫若鼎故受之以鼎主器者莫若長子故受之以震震者動也物不可以終動止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也進必有所歸故受之以歸妹得其所歸者必大故受之以豐豐者大也窮大者必失其居故受之以旅旅而無所容故受之以巽巽者入也入而後説之故受之以兌兌者説也説而後散之故受之以渙渙者離也物不可以終離故受之以節節而信之故受之以中孚有其信者必行之故受之以小過有過物者必濟故受之以既濟物不可窮也故受之以未濟終焉離卦傳乾剛坤柔比樂師憂臨觀之義或與或求屯見而不失其居蒙雜而著震起也艮止也損益盛衰之始也大畜時也無妄災也萃聚而升不來也謙輕而豫怠也噬嗑食也賁無色也兌見而巽伏也隨無故也蠱則飭也剝爛也復反也晉晝也明夷誅也井通而困相掩也咸速也恆久也渙離也節止也解緩也蹇難也暌外也家人內也否泰反其類也大壯則止遁則退也大有衆也同人親也革去故也鼎取新也小過過也中孚信也豐多故親寡旅也離上而坎下也小畜寡也履不處也需不進也訟不親也大過顛也姤遇也柔遇剛也漸女歸侍男行也頥養正也既濟定也歸妹女之終也未濟男之窮也夬決也剛決柔也君子道長小人道憂也周易易簡説卷三
