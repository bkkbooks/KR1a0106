body:
  text: 周易易簡說卷二明高攀龍撰下經艮下兊上咸亨利貞取女吉彖曰咸感也柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣咸者无心之感咸皆也彼此交感也二氣感應以相與則亨矣止而說男下女則貞矣取如是之女則吉也天地之感不可見而于萬物化生見之聖人感人心不可見而于天下和平見之觀其所感而天地萬物之情可見觀天地萬物之情而其所感益可見葢神感神應莫知其然有心與之豈咸也哉象曰山上有澤咸君子以虛受人山上有澤山氣上升澤氣下潤二氣感應無所不受君子之以虚受人也如之初六咸其拇象曰咸其拇志在外也咸者自然之感感而无感故卦以相與成咸爻以相感為累初最下拇最微故雖志在外而无凶也六二咸其腓凶居吉象曰雖凶居吉順不害也二應說而動故凶居則守其艮止之道故吉以中故能居九三咸其股執其隨往吝象曰咸其股亦不處也志在隨人所執下也三應説主隨之而動故如股之不能自主隨足而動也九四貞吉悔亡憧憧往來朋従爾思象曰貞吉悔亡未感害也憧憧往來未光大也四當心位四非能貞者故以憧憧為戒憧從心從童蒙昧不明也人心一憧憧而朋類紛然從之往來无休其害可知若復於未感之先則貞矣貞則光大矣咸六爻无全吉者人心易動而難貞也九五咸其脢无悔象曰咸其脢志末也脢背肉雖非妄動而非貞象云志末見道貴立本上六咸其輔頰舌象曰咸其輔頰舌滕口說也上以輔頰舌為咸咸益下矣六爻皆以人身取象見動于形皆欲也四不以形而以意意亦欲也聖人感人心者一貞而已巽下震上恒亨无咎利貞利有攸往彖曰恒久也剛上而柔下雷風相與巽而動剛柔皆應恒恒亨无咎利貞久于其道也天地之道恒久而不已也利有攸往終則有始也日月得天而能久照四時變化而能乆成聖人久于其道而天下化成觀其所恒而天地萬物之情可見矣恒而亨則无咎以其貞也貞者不易之道即變易之道故利有攸往剛上柔下雷風相與巽而動剛柔皆應四者不易之道所以恒也終則有始此變易之道正所以恒也故日月順天行而无停晷四時變化而无停機變易者乃所以為不易聖人乆道化成千變萬化而不易其貞此天地萬物之所恒也豈有失其貞膠于一而能恒者乎象曰雷風恒君子以立不易方天下之至變易者无如雷風然萬古變易之雷風即萬古不易之雷風君子之立不易方以此初六浚恒貞凶无攸利象曰浚恒之凶始求深也居初而巽性務入故浚此執其常理而不知變者也九二悔亡象曰九二悔亡能久中也中之道平常而已玩九二悔亡之詞何平常如之此所以為中而可乆也九三不恒其徳或承之羞貞吝象曰不恒其徳无所容也不恒之人其羞无方故曰或承以九居三故曰貞而无救其為吝也葢天下未有不識中道而能恒其徳者九四田无禽象曰乆非其位安得禽也以九居四雖得初應而田无禽者田必有禽自是常理四失其中正之常也六五恒其徳貞婦人吉夫子凶象曰婦人貞吉従一而終也夫子制義従婦凶也五以中故恒以六故為婦人之恒乾道變化而能恒地道順承而不能變也上六振恒凶象曰振恒在上大无功也上以動之極故振不安平易而喜變易彼以求功也烏知大无功乎艮下乾上遯亨小利貞彖曰遯亨遯而亨也剛當位而應與時行也小利貞浸而長也遯之時義大矣哉遯之所以亨者以剛當位而應不係于應能與時行也是時二隂雖長然長以浸止體未進未遽剝陽柔小之利在貞剛則正于此時而行所以時義之大也象曰天下有山遯君子以逺小人不惡而嚴天下有山山形有限天體无窮若遯而去之不相即也君子嚴以律已而小人自逺陟山者豈能攀附于天乎初六遯尾厲勿用有攸往象曰遯尾之厲不往何災也六爻皆發遯時之義非以初二為害正也初在下故為遯尾不往則雖厲而无災葢居下位而以隱嘿自全者六二執之用黃牛之革莫之勝說象曰執用黃牛固志也六二中正應五葢堅固自守詞說不可得而搖奪者當遯之時秉志當如是矣九三係遯有疾厲畜臣妾吉象曰係遯之厲有疾憊也畜臣妾吉不可大事也三比二隂欲遯而係以畜臣妾者優柔容與之態而决于去就之大闗其能遯乎疾厲宜矣九四好遯君子吉小人否象曰君子好遯小人否也四為初應而能遯是有相好而不為所係也君子以失其所好而遯小人以失其所好而否矣九五嘉遯貞吉象曰嘉遯貞吉以正志也九五正當位而應與時行者所以為嘉所以為貞而吉上九肥遯无不利象曰肥遯无不利无所疑也上則浩然物外不俟戰勝而肥其視疾憊者何如哉乾下震上大壯利貞彖曰大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣四陽曰大者壯剛以動動未必皆出于正故大壯利貞人心正大即天地之情故曰正大而天地之情可見象曰雷在天上大壯君子以非禮弗履雷在天上是何力氣君子之非禮弗履者如此初九壯于趾征凶有孚象曰壯于趾其孚窮也以初而壯于進其凶信矣易者時位也違時位而動未有不凶者征而凶則不征而吉矣九二貞吉象曰九二貞吉以中也九二以中不妄動而貞吉也九三小人用壯君子用罔貞厲羝羊觸藩羸其角象曰小人用壯君子罔也九三何以並言君子小人用罔之君子無以異于用壯之小人也貞厲同觸藩羸角同人品異而僨事一也九四貞吉悔亡藩決不羸壯于大輿之輹象曰藩決不羸尚往也九四正剛以動而不失其正者也六五喪羊于易无悔象曰喪羊于易位不當也六五順陽而不觸是䘮羊而従平易之道柔之處不當位者宜如是矣上六羝羊觸藩不能退不能遂无攸利艱則吉象曰不能退不能遂不詳也艱則吉咎不長也進則厲矣艱則吉矣一念變易易凶而吉反掌也爻言艱象言詳㫖哉坤下離上晉康侯用錫馬蕃庶晝日三接彖曰晉進也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也明出地上晉象也順而麗乎大明康侯象也錫馬蕃庶坤象也晝日三接離象也以安民之侯順事大明之君上下相際如此之盛也象曰明出地上晉君子以自昭明徳明徳本明又當自昭之使大明升于天而不入于地也初六晉如摧如貞吉罔孚裕无咎象曰晉如摧如獨行正也裕无咎未受命也始進而摧如則貞吉罔孚而裕則无咎端謹雍容在下无躁進之失也六二晉如愁如貞吉受兹介福于其王母象曰受茲介福以中正也晉如愁如不以進為樂而務盡其道于貞道為至吉也王母柔之至尊受介福于王母柔道之至美也六三衆允悔亡象曰衆允之志上行也衆之允順之至也以上麗大明也故以六居三而悔亡九四晉如鼫䑕貞厲象曰鼫鼠貞厲位不當也以不中不正之人居大明之世如鼫鼠之晝見也六五悔亡失得勿恤往吉无不利象曰失得勿恤往有慶也天下所順従而不計失得如是而往皆天理之至公无功利之私意其光大何如故吉无不利也上九晉其角維用伐邑厲吉无咎貞吝象曰維用伐邑道未光也晉其角進之極也維宜用之伐邑然人至于有私而用伐非其本質矣故厲吉无咎而于貞道為吝以未至光大也離下坤上明夷利艱貞彖曰明入地中明夷内文明而外柔順以蒙大難文王以之利艱貞晦其明也内難而能正其志箕子以之内文明外柔順明夷也文王以之以即六十四象之以文王以之蒙大難也艱貞者内難而正其志也以艱而晦其明以貞而明不息也象曰明入地中明夷君子以蒞衆用晦而明晦而明明不露也如在地中者然初九明夷于飛垂其翼君子于行三日不食有攸往主人有言象曰君子于行義不食也于飛垂翼不為所容決矣君子見其幾微而行雖至三日不食不顧也雖至所往主人有言不顧也義之剛果明決如此六二明夷夷于左股用拯馬壯吉象曰六二之吉順以則也六二柔順中正克盡臣則故雖夷于左股而用拯馬壯其吉可知九三明夷于南狩得其大首不可疾貞象曰南狩之志乃有得也九三正當暗主故南狩而得之觀孟津遲回而不可疾貞見矣六四入于左腹獲明夷之心于出門庭象曰入于左腹獲心意也入于左腹獲明夷之心者窺見至隠而後去之也六五箕子之明夷利貞象曰箕子之貞明不可息也五之利貞者如箕子之晦其明而後為不失其貞也上六不明晦初登于天後入于地象曰初登于天照四國也後入于地失則也上六失其則而其明息矣然後入于地者即初登于天者也明之夷葢自夷之離下巽上家人利女貞彖曰家人女正位乎内男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣卦以二女故曰利女貞必男正而後女正然必女正而後見男之正父父子子兄兄弟弟夫夫婦婦家之正也而由于能嚴君其父母故家不能嚴君其父母者未有能正其家者也以二卦言女以二五言曰父母九五六二男女之正女貞者先正其内也象曰風自火出家人君子以言有物而行有恒離在内巽在外風自火出實則家人為風化之本君子所以正其家者言有物行有恒而已初九閑有家悔亡象曰閑有家志未變也于初即曰閑閑之于初閑之于志未變也故用力易而悔亡六二无攸遂在中饋貞吉象曰六二之吉順以巽也巽剛在五二能順之无所自遂主中饋而已何貞吉如之乎九三家人嗃嗃悔厲吉婦子嘻嘻終吝象曰家人嗃嗃未失也婦子嘻嘻失家節也九三剛而不中故有嗃嗃之象嗃嗃者嘻嘻之反嘻嘻喜笑也嘻嘻則失家節而終吝正以見嗃嗃者雖悔厲而吉也六四富家大吉象曰富家大吉順在位也六四之巽順則富家而大吉矣記曰父子篤兄弟睦夫婦和家之肥也諺曰十人十心无財市鍼十人一心有財市金其富家之謂乎九五王假有家勿恤吉象曰王假有家交相愛也内外交相愛而後為有其家王至于有其家而又何恤乎云勿恤者但盡正理更勿恤其他也自古有天下而能有其家者鮮矣故曰王假有家上九有孚威如終吉象曰威如之吉反身之謂也有孚則威如矣未有其身之不誠而有威之可畏者家人重嚴君嚴以反身之誠也兊下離上暌小事吉彖曰暌火動而上澤動而下二女同居其志不同行說而麗乎明柔進而上行得中而應乎剛是以小事吉天地暌而其事同也男女暌而其志通也萬物暌而其事類也暌之時用大矣哉卦之所以為暌者以火動而上澤動而下二女同居志不同行也所以小事吉者以說而麗乎明柔進而上行得中而應乎剛也卦才如是特可小事者以柔也然而聖人又大用之者何也聖人于原本處見其同不于暌乖處見其異无不可合異而之同也象曰上火下澤暌君子以同而異聖人用暌異而同之取象又同而異之何也君子所同者義理也所異者世俗也惟其同也故不得不異惟其異也乃所以為同初九悔亡喪馬勿逐自復見惡人无咎象曰見惡人以辟咎也初九以暌之時有悔也而剛正故悔亡喪馬失其所以行也守正自亨故不逐自復見惡人亦謂迫斯見之非往見也九二遇主于巷无咎象曰遇主于巷未失道也遇則非禮見巷則非大途委曲以諭之于道非失道也六三見輿曵其牛掣其人天且劓无初有終象曰見輿曵位不當也无初有終遇剛也六三之疑上也若見上之曵其輿矣掣其牛矣其人髠而且劓矣皆妄見也妄何可常故无初有終而自與上相遇也九四暌孤遇元夫交孚厲无咎象曰交孚无咎志行也四之與初非正應也故為暌孤然同徳也故為元夫交則志行雖厲而无咎也六五悔亡厥宗噬膚往何咎象曰厥宗噬膚往有慶也六五之悔亡以中也厥宗二也噬膚入之深也如是而往入之深而益深不惟无咎而有慶矣上九暌孤見豕負塗載鬼一車先張之弧後說之弧匪宼婚媾往遇雨則吉象曰遇雨之吉羣疑亡也上之與三非應也故亦曰暌孤見三為負塗之豕載鬼之車先張弧而欲敵之後說弧而知其非宼也乃婚媾也離下而兊上水火濟兊成澤故遇雨而吉也艮下坎上蹇利西南不利東北利見大人貞吉彖曰蹇難也險在前也見險而能止知矣哉蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉蹇難也艱難之難水而遇山其道窮矣遇險而止則往于坤矣東北者西南之對不之于東北即往而西南前路既窮轉而來反即止為往也中正者濟蹇之道五當位貞吉而能正邦故利見之以濟蹇止而得中即見大人而有功也象曰山上有水蹇君子以反身修徳君子之反身修徳何時不然而于蹇言之艱雖之時厯世愈苦則自考愈真反修有獨至者矣初六往蹇來譽象曰往蹇來譽宜待也來而不往者不往于東北而來于西南也初在下宜待故來而待時則譽也六二王臣蹇蹇匪躬之故象曰王臣蹇蹇終无尤也蹇蹇不輕進也此豈為其身圖乎故曰匪躬之故象又明其无尤也九三往蹇來反象曰往蹇來反内喜之也三為成卦之主二三一體二三所喜也反者反于内得其所喜也六四往蹇來連象曰往蹇來連當位實也四來與三連以四當位能得三之實也九五大蹇朋來象曰大蹇朋來以中節也五當位貞吉而中節故諸爻皆以五之節為節凡來者皆來于五也上六往蹇來碩吉利見大人象曰往蹇來碩志在内也利見大人以從貴也上之來來于三三則合諸爻來于五所謂朋來皆見大人而有功也坎下震上解利西南无所往其來復吉有攸往夙吉彖曰解險以動動而免乎險解解利西南往得衆也其來復吉有攸往夙吉往有功也天地解而雷雨作雷雨作而百果草木皆甲拆解之時大矣哉解動于險外以東北之卦往而之西南為動而免于險也无所往未可有為之時有攸往可以有為之時來復坎之二也夙吉震之四也解以解天下之難時至方動間不容髮故聖人大解之時而以无所往有攸往審時之幾也象曰雷雨作解君子以赦過宥罪天地以雷雨普萬物之生聖人以雷雨普赦宥之澤初六无咎象曰剛柔之際義无咎也觀初六之无咎而知易重剛柔之際九二田獲三狐得黄矢貞吉象曰九二貞吉得中道也解天下之難者去天下之小人而已去天下之小人以中直之道而已六三負且乗致宼至貞吝象曰負且乗亦可醜也自我致戎又誰咎也六三其狐乎負乗而致宼其吝也理所宜然故曰貞吝九四解而拇朋至斯孚象曰解而拇未當位也初六應剛而无咎九四應初而為拇解陰拇而孚陽明絶陰私以出險難也六五君子維有解吉有孚于小人象曰君子有解小人退也君子相維則有解矣未有君子之維不固而小人退者未有小人在位而君子有解者上六公用射隼于高墉之上獲之无不利象曰公用射隼以解悖也以上之正則有其徳矣公則有其位矣卦終則有其時矣云射隼云高墉之上云獲之成器而動待時而發故出而有獲聖人解悖之用如此兊下艮上損有孚元吉无咎可貞利有攸往曷之用二簋可用亨彖曰損損下益上其道上行損而有孚元吉无咎可貞利有攸往曷之用二簋可用亨二簋應有時損剛益柔有時損益盈虚與時偕行損以三上為成卦之主剛上為益上柔下為損下故曰損下益上其道上行損而有孚既元吉又无咎又可貞又利有攸往備天下之衆善也時當損而損即二簋可用亨以孚誠為本无所用乎煩文也象曰山下有澤損君子以懲忿窒欲天下之當損者莫過忿欲懲戒于既往之禍則忿易銷窒塞于方萌之幾則欲易制初九已事遄往无咎酌損之象曰已事遄往尚合志也初九益上須如已事而遄往則无咎然不自失者方能益人故又當酌損下之益上莫尚于與上合志也九二利貞征凶弗損益之象曰九二利貞中以為志也二居柔而說體故戒利貞征凶弗損之益非中以為志者孰能識之六三三人行則損一人一人行則得其友象曰一人行三則疑也天地之化兩而已矣兩者生生之本三則損其一而一斯得其友一人行者以三則疑也兩所以為致一也六四損其疾使遄有喜无咎象曰損其疾亦可喜也六四虚已受初之益自損其疾而使遄初遄往而已亦遄損有喜矣六五或益之十朋之龜弗克違元吉象曰六五元吉自上祐也六五非専受二之益者益來无方故曰或十朋之龜龜之至靈也靈明天啟欲違之而不能葢自天祐之也上九弗損益之无咎貞吉利有攸往得臣无家象曰弗損益之大得志也上九受下之益者也弗損下而反以益之故備損之衆美得臣得天下之臣服无家以天下為一家斯為君子之大得志也震下巽上益利有攸往利涉大川彖曰益損上益下民說無疆自上下下其道大光利有攸往中正有慶利涉大川木道乃行益動而巽日進无疆天施地生其益无方凡益之道與時偕行益以初四為成卦之主剛下為益下柔上為損上故曰損上益下自上下下中正者二五也中正之道何往不利乎木道者震巽也生生之道何大川不可涉乎動而順理自有日進无疆之福時當春夏正是天施地生之時損之偕時時損而損益之偕時无時不益天地之益萬物聖人之益萬民一而已矣象曰風雷益君子以見善則遷有過則改天下之有益者莫過遷善改過風雷一過宇宙改色人心一新靣目皆别故遷改者起死回生之神劑超凡入聖之捷法也初九利用為大作元吉无咎象曰元吉无咎下不厚事也在下者不厚任事初九為上所益大作元吉乃得无咎以下而厚事也六二或益之十朋之龜弗克違永貞吉王用享于帝吉象曰或益之自外來也或益之无方之益也十朋之龜弗克違益之雖自外來靈心實本自具故不能違以六故有永貞之戒如王之亨于帝者然以享帝之心承君斯為永貞之吉也六三益之用凶事无咎有孚中行告公用圭象曰益用凶事固有之也凶事乃三之固有而善受者反以凶事得益為其有孚中行誠信通于上也人能于貧賤憂戚受天之玉成者如此六四中行告公従利用為依遷國象曰告公従以益志也六四益初者必以中行告公從而益之大臣之義也故雖以之為依従之遷國民親之而上不疑者以能益君之志信于上而行于下也九五有孚惠心勿問元吉有孚惠我徳象曰有孚惠心勿問之矣惠我徳大得志也大君有孚惠心如天施地生无擇于物何問之有故天下亦有孚惠其徳而志乃大得也上九莫益之或擊之立心勿恒凶象曰莫益之偏辭也或擊之自外來也上九无益下之志下亦莫益之且或擊之如是立心其可恒乎哉偏辭者猶言豈但莫益之而擊之者且立至也乾下兊上夬揚于王庭孚號有厲告自邑不利即戎利有攸往彖曰夬決也剛決柔也健而說決而和揚于王庭柔乗五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也揚于王庭明白正大而不事陰謀也孚號有厲戒懼兢業而不忽細微也但告勑于同類不角勝于異己此所謂健而說決而和利有攸往矣何也卦惟一柔而乗于五剛之上勢尚可危揚之號之則彼計无可伏而危乃光自邑告戒不與即戎則彼隙无可投而往決易矣象曰澤上于天夬君子以施祿及下居徳則忌施逮下之祿居敬忌之徳兊之澤而乾之惕也初九壯于前趾往不勝為咎象曰不勝而往咎也躁動于初未有能勝者其咎宜矣九二惕號莫夜有戎勿恤象曰有戎勿恤得中道也蘇氏曰惕號莫夜警也有戎勿恤靜也九三壯于頄有凶君子夬夬獨行遇雨若濡有愠无咎象曰君子夬夬終无咎也九三過剛而應上過剛故有壯頄之戒應上故有夬夬之戒獨行而不暴其意遇雨而不避其嫌雖若濡而見疑于正人有愠而暫晦于形迹然至于夬夬臻厥成而晏如矣何咎之有九四臀无膚其行次且牽羊悔亡聞言不信象曰其行次且位不當也聞言不信聰不明也九四位不中正欲止則不能違陽而居之不安欲往則不能決上而行之不進計无若引衆陽之進可以亡已之悔而聞言不信也大臣不能與衆正同心而暱陰邪自累者毎如此九五莧陸夬夬中行无咎象曰中行无咎中未光也九五為夬主而近上六如莧陸在五陽之月受陰氣而生有不自覺者必須夬夬于中行乃无咎然一私未鎔中未光也上六无號終有凶象曰无號之凶終不可長也无號終有凶決辭也小人能自決未有不可從善者如沈㝠不悟何哉巽下乾上姤女壯勿用取女彖曰姤遇也柔遇剛也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉姤之時天地相遇品物咸章之時也剛居九五剛遇中正天下大行之時也而一陰始生方壯之女不可與長久聖人為戒于方盛而謹于幾微如此象曰天下有風姤后以施命誥四方后施命而四方風動者豈文告之末哉有所以風之也命不自人主真精神流布何以能風初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅象曰繫于金柅柔道牽也方生之陰其勢豈人所能制而聖人設繫于金柅之戒以爲如是于貞道方吉若使有攸往則惟凶是見矣葢羸豕之孚在蹢躅物性則然聖人乃因物而施則也九二包有魚无咎不利賔象曰包有魚義不及賔也二以初為魚而包之則无咎其義不可使往而應四故曰不及賔九三臀无膚其行次且厲无大咎象曰其行次且行未牽也九三志欲下行而後迫于四前阻于二其厲如此而无大咎也九四包无魚起凶象曰无魚之凶遠民也九四應初而才不中正不能包魚居上无民凶自此起九五以杞包𤓰含章有隕自天象曰九五含章中正也有隕自天志不舍命也九五居高包下不大聲色何含章如之雖始生之陰必有自天隕落者以其念念不舍正命而天必應之也上九姤其角吝无咎象曰姤其角上窮吝也上九高亢自守不能包物故吝而亦无咎坤下兊上萃亨王假有廟利見大人亨利貞用大牲吉利有攸往彖曰萃聚也順以說剛中而應故聚也王假有廟致孝亨也利見大人亨聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣萃之所以聚者順天下之理說天下之心五剛得中上下順而歸之也王之所以萃天下之心者以假于有廟之心天下所以利見者以用大牲之心王假有廟之心剛中也用大牲之心順應也此之謂聚以正而天地萬物之情觀其所聚而見矣象曰澤上于地萃君子以除戎器戒不虞物之所聚則有不虞簡除戎器戒備不虞如澤上于地而防之也初六有孚不終乃亂乃萃若號一握為笑勿恤往无咎象曰乃亂乃萃其志亂也初六陰柔不能自立故有孚不終志亂而妄聚若號正應則羣陰一掬笑之勿恤而往則无咎也六二引吉无咎孚乃利用禴象曰引吉无咎中未變也六二相引萃五則吉而无咎孚乃利用禴亦惟利用禴乃孚中心如固不假物而固也六三萃如嗟如无攸利往无咎小吝象曰往无咎上巽也三不中正不當于五故萃如不能而嗟如果何所利乎則往而従上雖小吝而无咎以巽于理也九四大吉无咎象曰大吉无咎位不當也九四不當萃之位而有萃之責故必大吉而後无咎也九五萃有位无咎匪孚元永貞悔亡象曰萃有位志未光也九五何以有匪孚乎天下之萃大矣居天下之萃難矣所謂堯舜猶病而元永貞止得悔亡而已上六齎咨涕洟无咎象曰齎咨涕洟未安上也上六居五之上不安宜矣必齎咨涕洟乃无咎也巽下坤上升元亨用見大人勿恤南征吉彖曰柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也木方升正元亨之時剛中而應則君臣同徳其志行而福慶可及于天下故當勿恤而前進也象曰地中生木升君子以順徳積小以高大地中生木生機之自然惟自然之順徳生生自不容已可以積小高大也初六允升大吉象曰允升大吉上合志也初六允升與二合志也九二孚乃利用禴无咎象曰九二之孚有喜也九二之孚天下之慶也何喜如之九三升虚邑象曰升虚邑无所疑也三陰在上至虚以聴而无所窒礙于前故如升虚邑也六四王用亨于岐山吉无咎象曰王用亨于岐山順事也六四之順事惟文王之亨于岐山者象之六五貞吉升階象曰貞吉升階大得志也六五之貞在順應九二之賢二之升如升階焉都俞于一堂之上矣此所以大得其志也上六㝠升利于不息之貞象曰㝠升在上消不富也㝠升者不識不知而升正不息之貞也伎倆不存渣滓渾化日進于不可知之神其消不富之謂與學者順天理之自然上達之極致也坎下兊上困亨貞大人吉无咎有言不信彖曰困剛揜也險以說困而不失其所亨其唯君子乎貞大人吉以剛中也有言不信尚口乃窮也剛為柔揜而險以說險難中自有說心者故困而不失其所者不失其剛中而已困之時天下其孰信之而有言乎故兊取說心而戒尚口象曰澤无水困君子以致命遂志何地何時不可自遂其志不能遂志者不能致命也今曰一切聴之于命吾順受而无容心焉是委命而非致命也致極乎命知天所付之正理所謂困而不失其所者何志之不可遂豈人所得而困乎初六臀困于株木入于幽谷三嵗不覿象曰入于幽谷幽不明也初六在下臀象也困于株木則居不能安而困甚矣所以困者以入于幽谷而不明故至于三嵗而不覿小人欲困君子不知適以自困原其所以幽不明而巳九二困于酒食朱紱方來利用亨祀征凶无咎象曰困于酒食中有慶也九二能飲食天下困之者非能困其人困于酒食而不能澤物耳然上有剛中之君朱紱方來其慶自在特利于享祀之誠自守之固故不征則无咎也六三困于石據于蒺藜入于其宫不見其妻凶象曰據于蒺藜乗剛也入于其宫不見其妻不祥也六三欲困四者不知四之不可困故曰困于石是乗二者不知二之不可乗故曰據于蒺藜上下俱困自入其宫而上非其應不見其妻小人専揜君子故不祥莫大焉九四來徐徐困于金車吝有終象曰來徐徐志在下也雖不當位有與也九四應初故有來徐徐困于金車之吝然所與在五其終必合四之有終者以有與也九五劓刖困于赤紱乃徐有說利用祭祀象曰劓刖志未得也乃徐有說以中直也利用祭祀受福也上下俱傷曰劓刖賢臣未遇曰困于赤紱然徐則必遇而有說特利用祭祀之誠而受福也上六困于葛藟于臲卼曰動悔有悔征吉象曰困于葛藟未當也動悔有悔吉行也以六有葛藟之纒束以上有臲卼之高危是以動而有悔能自知其動悔有悔則征而吉矣小人初快于一時其究也葛藟臲卼皆自受之聖人因其困極而悔詔以悔過吉行所謂變而通之以盡利也巽下坎上井改邑不改井无喪无得往來井井汔至亦未繘井羸其瓶凶彖曰巽乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也木在下巽乎水也水在上上水也井以上水為養以剛中為泉中之在人猶泉之在地其體不易其用无窮改邑不改井无喪无得不易也往來井井无窮也幾至而綆未上井乃羸其瓶則失上水之義不成井養之功是以凶象曰木上有水井君子以勞民勸相君子之養人也豈人人而濟之哉勞來其民勸勉而相助之田里樹畜養而不窮矣初六井泥不食舊井无禽象曰井泥不食下也舊井无禽時舍也初六在下為泥而不食之舊井禽鹿盧也九二井谷射鮒甕敝漏象曰井谷射鮒无與也二无應與故下而不上如澗谷之水止于射鮒甃井之甕敝漏矣九三井渫不食為我心惻可用汲王明並受其福象曰井渫不食行惻也求王明受福也九三之泉清渫而不食故行道心惻惟王明能汲之而上下並受其福也六四井甃无咎象曰井甃无咎修井也六四以甃修而无咎未能及物也九五井冽寒泉食象曰寒泉之食中正也九五剛中故為清冽之寒泉天下用汲而食也上六井收勿幕有孚元吉象曰元吉在上大成也收鹿盧收繘者收則上水勿幕以待井井而井養之功大成矣離下兊上革已日乃孚元亨利貞悔亡彖曰革水火相息二女同居其志不相得曰革已日乃孚革而信之文明以說大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉已日當革之日也土者中也已土者離之中也正當革之時故革而信之大亨以正而悔亡也天地之四時差一日不得湯武之革命蚤一日不得革當乎革之時已日乃孚矣象曰澤中有火革君子以治厯明時四時之革惟夏秋發生而忽肅殺其革為著故澤中有火為革君子以之治厯明時四時有自然之革君子特厯以明之于此見六十四卦之以易本如是聖人亦如是所謂顯道神徳行也初九鞏用黄牛之革象曰鞏用黄牛不可以有為也初九不可以有為固守而勿為則得中順之理為黄牛之革六二已日乃革之征吉无咎象曰已日革之行有嘉也文明之主上而應說正彖之所謂已日征而従五非自革也九三征凶貞厲革言三就有孚象曰革言三就又何之矣九三征則凶而貞則厲度時審勢間不容髮必至言革者三就則有孚也九四悔亡有孚改命吉象曰改命之吉信志也九四當水火之際正改命之時天下信其志故悔亡而吉九五大人虎變未占有孚象曰大人虎變其文炳也九五大人虎變于上天下不占而孚過化存神之革也上六君子豹變小人革面征凶居貞吉象曰君子豹變其文蔚也小人革面順以従君也上六革道之成其君子則蔚然文明其小人則順以相向于斯時也復何為哉為不當矣故征則凶而居貞則吉也巽下離上鼎元吉亨彖曰鼎象也以木巽火烹飪也聖人亨以享上帝而大亨以養聖賢巽而耳目聰明柔進而上行得中而應乎剛是以元亨鼎曰象者以鼎為象也以木巽火烹飪之象也聖人烹飪則以享上帝養聖賢由此推之聖人于天下至小之物皆成莫大之用也鼎所以元亨者六五五所以耳目聰明者得中應剛元亨者春夏之生長萬物鼎新之象也象曰木上有火鼎君子以正位凝命鼎為安重之器木生有火正心不違仁之妙故曰正位凝命命須如是而凝也初六鼎顛趾利出否得妾以其子无咎象曰鼎顛趾未悖也利出否以従貴也初為鼎主趾顛則出否故以鼎趾之用成九二鼎實之功如妾左右其中饋之内子顛而未悖于義者以賤而従貴也九二鼎有實我仇有疾不我能即吉象曰鼎有實慎所之也我仇有疾終无尤也九二鼎實如鼎中之物不可與木火相即故與初為仇慎而不相即故我仇有疾而終无尤也九三鼎耳革其行塞雉膏不食方雨虧悔終吉象曰鼎耳革失其義也鼎耳在五革者謂三與五不應也變易其常耳炎不舉則三實行塞雉膏不食失鼎之義矣必方雨而和則悔虧而吉見三之于五非相應而相成也九四鼎折足覆公餗其形渥凶象曰覆公餗信如何也四應初故折足覆餗而形濡渥小人敗類其初不信而今則何如邪六五鼎黄耳金鉉利貞象曰鼎黄耳中以為實也黄耳金鉉則鼎實可食故曰中以為實惟五之中應二之剛成鼎之義利以下應為貞也上九鼎玉鉉大吉无不利象曰玉鉉在上剛柔節也玉鉉則剛柔得宜而鼎耳可舉鼎用之成故大吉无不利震下震上震亨震來虩虩笑言啞啞震驚百里不喪匕鬯彖曰震亨震來虩虩恐致福也笑言啞啞後有則也震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也震之所以亨者有二一則以震懼而致福一則以震懼而不失其所守震來虩虩笑言啞啞者致福者也震驚百里不喪匕鬯者不失其所守者也君主匕鬯不以震驚而喪如是則可以守宗廟社稷以為祭主也象曰洊雷震君子以恐懼修省君子之恐懼修省何時不然而待洊雷之震乎不以洊雷而始有未嘗不以洊雷而加惕豈獨洊雷一切恐懼之事皆君子之修省益密者也初九震來虩虩後笑言啞啞吉象曰震來虩虩恐致福也笑言啞啞後有則也震而致福初九當之人心未得其中藉此一震而後有則有則則中矣六二震來厲億喪貝躋于九陵勿逐七日得象曰震來厲乗剛也二以柔乗剛震來厲而喪其中至躋于九陵逐之不知中者人心固有勿逐而自得七日陽復之候人心之復其常如卦之一反復也六三震蘇蘇震行无眚象曰震蘇蘇位不當也三不當位至于蘇蘇自失能反其所震者修省于行己則无眚也九四震遂泥象曰震遂泥未光也九居四而陷于重陰故遂泥而不光六五震往來厲億无喪有事象曰震往來厲危行也其事在中大无喪也不喪匕鬯者六五當之億无喪猶云萬无失其事在中安得喪乎于有事匕鬯之時體在中之義則當大震懼而不失其所者可識矣上六震索索視矍矍征凶震不于其躬于其鄰无咎婚媾有言象曰震索索中未得也雖凶无咎畏鄰戒也上六震而失其守索索矍矍視蘇蘇益甚矣何者中未得也何征之不凶哉若能于震未及躬而先有主于震鄰之日則敬戒之心足以當震驚之至雖婚媾以為迂而有言然得无咎矣艮下艮上艮其背不獲其身行其庭不見其人无咎彖曰艮止也時止則止時行則行動靜不失其時其道光明艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人无咎也易是一定不易之至理隨時變易者正變易以従其不易者也故時止則止時行則行一止于當止當行之所也人心所以不止以内見我外見人人我之見一生而一定之所遂失上下敵應不相與則不係累于感應之私故艮背而不獲其身行庭而不見其人也然而止于无咎者何也靜而无靜動而无動吉凶悔吝所不能加言无咎而已象曰兼山艮君子以思不出其位思不出位止法也隨動隨靜各有位在思與位俱則心隨身止矣初六艮其趾无咎利永貞象曰艮其趾未失正也初六止之于趾是慎動第一步又何咎之有利永貞者終于不動乎終于守正而已六二艮其腓不拯其隨其心不快象曰不拯其隨未退聴也二能艮腓而三卦主不拯其失者三不能退而聴二也然以二之中正故隨而不快豈失已而隨之者乎九三艮其限列其夤厲薰心象曰艮其限危薰心也九三不中當兩卦之間如限隔身之上下而判列其膂危厲薰心止不能安學不聞道毎如斯矣六四艮其身无咎象曰艮其身止諸躬也六四艮身如近裏着已之學守而未化者要亦无咎也六五艮其輔言有序悔亡象曰艮其輔以中正也六五艮輔是止于中非制于口言有序豈易事哉上九敦艮吉象曰敦艮之吉以厚終也上九敦艮是成終之學學不至是是曰无終艮下巽上漸女歸吉利貞彖曰漸之進也女歸吉也進得位往有功也進以正可以正邦也其位剛得中也止而巽動不窮也漸進也如是之進女歸則吉以其貞也進得位者進以正也進以正者剛得中也以靜止之心巽順而進則其動不窮此漸之貞所以利也象曰山上有木漸君子以居賢徳善俗居賢徳者寛以居之之居人之居賢徳亹亹而不已循循而有序則其日進而不自知善俗亦然漸涵浸漬而无速化之心則風移俗易而不覺矣初六鴻漸于干小子厲有言无咎象曰小子之厲義无咎也初六漸干之鴻未得所安故小子以為厲而有言于義實无咎也六二鴻漸于磐飲食衎衎吉象曰飲食衎衎不素飽也六二中正漸磐而安飲食衎衎而吉其吉豈无所為非素飽也故居位而安舒自適者皆素飽而失其衎衎之義者也九三鴻漸于陸夫征不復婦孕不育凶利禦宼象曰夫征不復離羣醜也婦孕不育失其道也利用禦宼順相保也九三過剛不中防其躁進故有夫征不復婦孕不育之凶禦其私邪順理相保則夫不離羣婦不失道矣六四鴻漸于木或得其桷无咎象曰或得其桷順以巽也鴻不木棲或得桷而安以順巽而无咎也九五鴻漸于陵婦三嵗不孕終莫之勝吉象曰終莫之勝吉得所願也九五與二中正相應自有必亨之理不正之敵豈能勝之故雖三嵗不孕而終得所願也上九鴻漸于陸其羽可用為儀吉象曰其羽可用為儀吉不可亂也上九漸于天衢所謂㝠鴻天下之物莫得而亂之故其羽可貴而用以儀世也兊下震上歸妹征凶无攸利彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也說以動所歸妹也征凶位不當也无攸利柔乗剛也古之嫁者女必少于男故少女稱妹陰陽相従震東兊西男上女下天地之大義也婚嫁者人之終生育者人之始何以凶而不利于所歸之妹以說而動也位不當失陰陽之正柔乗剛乖夫婦之常所以征凶无攸利也天下事以不正而往未有利者聖人示人之義明矣象曰澤上有雷歸妹君子以永終知敝欲永其終必知其敝敝于始未有永其終者此說以動之可畏也初九歸妹以娣跛能履征吉象曰歸妹以娣以恒也跛能履吉相承也初二之娣也娣无専行如跛之履則征吉以恒道承其主也九二𦕈能視利幽人之貞象曰利幽人之貞未變常也九二剛中賢正之女眇能視不全用其明幽人之貞不躁妄于動婦之常理如是也六三歸妹以須反歸以娣象曰歸妹以須未當也三六二之娣也上說于四則為須女之賤反歸于二庶得以娣之宜九四歸妹愆期遲歸有時象曰愆期之志有待而行也九四震主與三不相當非妄動于說者故愆期待時志歸于正也六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也五尊而應二故為帝乙歸妹以中徳為貴豈效娣袂為良女徳之盛幾望之月矣吉孰尚焉上六女承筐无實士刲羊无血无攸利象曰上六无實承虚筐也上六為女徳之无終者女承筐而无實則士刲羊而无血矣六爻皆言所歸之妹也離下震上豐亨王假之勿憂宜日中彖曰豐大也明以動故豐王假之尚大也勿憂宜日中宜照天下也日中則昃月盈則食天地盈虚與時消息而況于人乎況于鬼神乎豐之亨惟王能至之王者大而无外也當盛大者不能无憂勿用有憂為日中之照而已大明中天則天下之壞亂吾治者皆足以照之所以保吾盛大也若夫中而昃自是天地盈虚消息舍日中之照亦别无保常中之道矣象曰雷電皆至豐君子以折獄致刑折獄以明致刑以斷故于雷電皆至之豐言之初九遇其配主雖旬无咎往有尚象曰雖旬无咎過旬災也初九雖非明主以明之初當九四動之初明以動也旬均也遇其配主雖均陽剛而无咎往則有尚矣過旬之災見明與動之不容少偏也六二豐其蔀日中見斗往得疑疾有孚發若吉象曰有孚發若信以發志也六二中正為明主而五不足以應故為蔀蔽其中天之日而見斗于晝五方蔀往則徒得其疑疾惟有孚而發其志意則吉也九三豐其沛日中見沬折其右肱无咎象曰豐其沛不可大事也折其右肱終不可用也蔽日如斾甚于蔀也小星皆見甚于斗也皆上六所為故三以至明亦失其右肱之用而于三无咎也九四豐其蔀日中見斗遇其夷主吉象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也四不當位豐蔀見斗皆四之為惟遇初夷主則吉也六五來章有慶譽吉象曰六五之吉有慶也二往五則疑五來二則章來天下之賢民被其慶君得其譽何吉如之上六豐其屋蔀其家闚其户閴其无人三嵗不覿凶象曰豐其屋天際翔也闚其户閴其无人自藏也上六柔暗自高豐屋蔀家而闚户无人至于三嵗不覿其誰蔽之自藏而已葢豐終動極上翔而不下應故失三之明而自取其凶也民下離上旅小亨旅貞吉彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉小者柔也中而順乎剛止而麗乎明旅之貞也旅之亨也夫旅窮而在外能得中順剛失其所止能止而麗乎明其亨則小其時義則大聖人贊旅之時義其有味于旅也乎象曰山上有火旅君子以明慎用刑而不畱獄山上有火其明在上故明慎用刑山上之火過而不留故不留獄明而曰慎恐恃其明留獄之病民也上之人能慎之者鮮矣初六旅瑣瑣斯其所取災象曰旅瑣瑣志窮災也初六最逺于明故旅而猶瑣瑣也斯其所以取災乎六二旅即次懷其資得童僕貞象曰得童僕貞終无尤也旅以即次而安懷資為用得童僕貞為賴六二中正故三者備而无尤也九三旅焚其次喪其童僕貞厲象曰旅焚其次亦以傷矣以旅與下其義喪也九三過剛不中失旅之貞反旅之亨故焚次喪童僕貞而厲也以旅與下者以旅之時居高臨下也三曰與下如上曰在上也九四旅于處得其資斧我心不快象曰旅于處未得位也得其資斧心未快也四不得位于處者非常處也雖得資斧未得所安心未快也六五射雉一矢亡終以譽命象曰終以譽命上逮也六五柔中順剛以文明而曰射雉不用直而曰矢亡故下皆麗之下之所歸譽之所逮也上九鳥焚其巢旅人先笑後號咷喪牛于易凶象曰以旅在上其義焚也喪牛于易終莫之聞也上九遇剛以旅之時而上人如此焚巢必矣其始傲然自得其究窮无所歸喪其順道不自覺知終莫之聞也巽下巽上巽小亨利有攸往利見大人彖曰重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人巽小卦也以申命而已所以小亨利有攸往者以剛中正而柔能順之志行者剛故亨而利往者亦剛中正之剛則利見之大人也象曰隨風巽君子以申命行事隨風者相繼而不已君子行事必申命而後行如盤庚遷殷者然故政莫惡于不教而誅不戒視成初六進退利武人之貞象曰進退志疑也利武人之貞志治也志以進退而疑以武毅貞正而治柔従剛之義也九二巽在牀下用史巫紛若吉无咎象曰紛若之吉得中也九二得中承五之命而布之下如尊者坐于牀卑者在牀下史巫紛若正諄切申命之象如是乃吉无咎九三頻巽吝象曰頻巽之吝志窮也兩巽相承頻巽之象九三居上過剛非能巽者故巽而頻失志不中者究必窮吝道也六四悔亡田獲三品象曰田獲三品有功也六四以順剛而悔亡有離之象焉故以田獲三品象其功也九五貞吉悔亡无不利无初有終先庚三日後庚三日吉象曰九五之吉位正中也巽五剛巽中正之大人故貞吉悔亡无不利申命行事者也事有弊壞則有變更弊則无始變則有終變者更也先庚後庚如先甲後甲甲云有始元之義也庚云有終貞之義也補偏救弊不同于撥亂反治也上九巽在牀下喪其資斧貞凶象曰巽在牀下上窮也喪其資斧正乎凶也上何以牀下上窮而反下也居柔巽極失其陽剛于貞道為凶故曰正乎凶也可以見貞凶之義矣兊下兊上兊亨利貞彖曰兊說也剛中而柔外說以利貞是以順乎天而應乎人說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉兊亦小卦不曰小亨者以剛中而柔外也此為兊之貞所以為兊之亨兊說順天而應人能先民而民忘勞犯難而民忘死其用甚大所利者貞而已人心得其貞則說天人不順應者非說之貞也象曰麗澤兊君子以朋友講習聖人舉天下至可說者歸之朋友講習知朋友講習之至可說而後不貞之說不足以說之矣初九和兊吉象曰和兊之吉行未疑也初九和兊是人心最初之真說未有所以係累其心者故行未疑九二孚兊吉悔亡象曰孚兊之吉信志也九二孚兊其志有以自信不為外物所移故吉而悔亡六三來兊凶象曰來兊之凶位不當也三内為來來說二也位不當而兊不貞也九四商兊未寧介疾有喜象曰九四之喜有慶也九四上承五下比三商度未寧介而疾邪則上同五下澤物有慶可喜也九五孚于剝有厲象曰孚于剝位正當也九五陽剛中正以孚信待人而密比陰柔若為所說乃為所剝矣五之有厲為位正當也上六引兊象曰上六引兊未光也說不本于中其味易盡故上兊為引其兊未光兩陰爻為說主而非兊貞故非兊亨易所用者剛中而已坎下巽上渙亨王假有廟利涉大川利貞彖曰渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利涉大川乗木有功也剛來而不窮何以不窮以中也柔得位乎外而上同同五也在中故曰假廟乗巽故能濟險此涣之亨所利之貞也人心渙其妄即聚其真而還其真即拯其渙也象曰風行水上渙先王以享于帝立廟享帝立廟所以合天下人心者以水木夲源之思人心所同也初六用拯馬壯吉象曰初六之吉順也初六順二是拯渙而馬壯也九二渙奔其杌悔亡象曰渙奔其杌得願也九二剛來而不窮是自奔其杌而得所願也故悔亡六三渙其躬无悔象曰渙其躬志在外也人之志内見一身遂難外通六三應上志在濟時渙其有我之私而无悔矣六四渙其羣元吉渙有丘匪夷所思象曰渙其羣元吉光大也六四同五是渙其陰之羣而得五之丘光大之吉非平常所思也九五渙汗其大號渙王居无咎象曰王居无咎正位也九五渙其大號以通天下之志天下通徹洽浹如一身更无壅閼括結而王居无咎矣是乃所謂正位也上九渙其血去逖出无咎象曰渙其血逺害也上九應險而能濟險故渙其血使其去而逺出正乘巽涉川之功葢與四五同功渙妄還真而拯渙者也兊下坎上節亨苦節不可貞彖曰節亨剛柔分而剛得中苦節不可貞其道窮也説以行險當位以節中正以通天地節而四時成節以制度不傷財不害民澤以節水剛柔平分剛得中而不過説以行險説遇險則有節而不流所以為節五當位而中正有節而能通所以為亨苦節則不中而不通故道窮而不可貞觀天地四時之節節自有天然不可易者以之制度用儉而物裕雖節制而實流通矣象曰澤上有水節君子以制數度議徳行制數度者為品節也議徳行者求中節也初九不出户庭无咎象曰不出户庭知通塞也初九應四説而思險无事不當謹密而言語為最故以不出户庭為无咎時當塞而知塞則時當通而亦知通矣九二不出門庭凶象曰不出門庭凶失時極也九二不出門庭不往從五也有中正之道而不從失時宜之極矣六三不節若則嗟若无咎象曰不節之嗟又誰咎也六三不節之嗟敏于知過又誰咎之六四安節亨象曰安節之亨承上道也六四安于自然之節承五中正之道也九五甘節吉往有尚象曰甘節之吉居位中也九五節而通故甘所往則有功而可嘉尚也上六苦節貞凶悔亡象曰苦節貞凶其道窮也上六所謂苦節不可貞而貞之者也然以貞而凶雖凶而悔亡葢雖苦而實節也兊下巽上中孚豚魚吉利涉大川利貞彖曰中孚柔在内而剛得中說而巽孚乃化邦也豚魚吉信及豚魚也利涉大川乗木舟虚也中孚以利貞乃應乎天也柔在内而中虚剛得中而中寔皆孚也下說而應上上巽以順下皆孚也豚魚澤中之信于風者信及豚魚者中心之孚乗木舟虚者中虚之象中孚以利貞乃應天道之利貞利貞者天之性情中孚者性情之自然莫之為而為故曰應乎天象曰澤上有風中孚君子以議獄緩死君子以議獄緩死之心孚天下天下無不孚者何一段真誠惻怛由中而孚也初九虞吉有他不燕象曰初九虞吉志未變也虞者憂虞人心自然之兢惕凡有真信者必有真虞而志始定也正與有他之心反有他則不燕矣故中孚之初要在真志不變虞而後吉九二鳴鶴在陰其子和之我有好爵吾與爾靡之象曰其子和之中心願也二五相孚中心之願故有鶴鳴子和我爵爾縻之象好爵者秉彛之良爾縻者懿德之好六三得敵或鼓或罷或泣或歌象曰或鼓或罷位不當也六三不中正比四得敵故上應不専鼓罷泣歌不能自主也六四月幾望馬匹亡无咎象曰馬匹亡絶𩔖上也六四孚主而近君得正而信上故為幾望之月能絶其三之匹而无咎也九五有孚攣如无咎象曰有孚攣如位正當也九五之孚二孚之至也故曰攣如上九翰音登于天貞凶象曰翰音登于天何可長也上九不知道者欲以小信孚人如翰音而期登天難矣故雖貞而亦凶艮下震上小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉彖曰小過小者過而亨也過以利貞與時行也柔而得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也小過以小者過而亨葢時有當過者時當過而過是以利貞而過也宜于小不宜于大宜于下不宜于上此小過之義也象曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉山上之雷聲若加過焉其地上也君子之行過乎恭喪過乎哀用過乎儉自世俗觀之為過君子不隨徇乎俗亦若有過焉所謂小者過而亨過與時行者正此𩔖也初六飛鳥以凶象曰飛鳥以凶不可如何也小過有飛鳥之象焉飛在翼初上當之皆有飛鳥之凶初陰而應動躁動小人如飛鳥焉所以凶也㝠然悍然不可如何矣六二過其祖遇其妣不及其君遇其臣无咎象曰不及其君臣不可過也六二中正小過之最善者四祖五君二則妣道也臣道也二雖過其祖亦不及其君自守其妣道臣道得无咎而已所謂下而不上小過之貞也九三弗過防之從或戕之凶象曰從或戕之凶如何也九三居得其位弗過也而比隂當防若從之則戕之矣九四无咎弗過遇之往厲必戒勿用永貞象曰弗過遇之位不當也往厲必戒終不可長也九四雖不當位弗過而遇之往則厲故必戒柔過之時剛失位而不可長如之何可永貞也六五密雲不雨自我西郊公弋取彼在穴象曰密雲不雨己上也六五密雲不能成雨不可大事也但可弋取在穴之二宜下也上六弗遇過之飛鳥離之凶是謂災眚象曰弗遇過之已亢也上六動體而過極不宜上而上如飛鳥離人之迅疾豈獨天災亦係人眚凶其宜矣離下坎上既濟亨小利貞初吉終亂彖曰既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也時既已濟則所亨者小而巳利貞者守其濟也初吉二也終亂上也不言五者爻巳明之時已過矣雖剛中之五不能如柔中之二也象曰水在火上既濟君子以思患而豫防之水上火下而成濟然離濟坎甚難水滅火甚易故思患豫防正于方盛之時也初九曵其輪濡其尾无咎象曰曵其輪義无咎也曵其輪未進也濡其尾未涉也濟事者當欲濟未可濟之時其慎如此故无咎六二婦喪其茀勿逐七日得象曰七日得以中道也婦喪其蔽車之茀則不可行既濟之時君臣相與異于共患難者矣然中正之道无終廢之理故勿逐而七日得也九三高宗伐鬼方三年克之小人勿用象曰三年克之憊也人但知盛時物力之甚裕不知盛時舉事之甚憊故以高宗伐鬼方猶克之于三年小人勿用者當嚴之于明盛也六四繻有衣袽終日戒象曰終日戒有所疑也繻帛也袽絮也皆以補塞罅漏既濟之時弊竇百出繻袽嚴備又須終日警戒爻在水火之交故取補塞之象九五東鄰殺牛不如西鄰之禴祭實受其福象曰東鄰殺牛不如西鄰之時也實受其福吉大來也此爻說者皆以五不如二故于東西之解穿鑿彌甚不知實受其福只說本爻味象詞自見葢既濟已過時只宜守儉自受其福不似初吉之時可為殺牛之祭也離東坎西天然本象又何俟他求哉上六濡其首厲象曰濡其首厲何可久也上六濡首之厲則彖之所謂終亂也坎下離上未濟亨小狐汔濟濡其尾无攸利彖曰未濟亨柔得中也小狐汔濟未出中也濡其尾无攸利不續終也雖不當位剛柔應也既未皆明濟險皆用柔中未濟所以亨者六五也小狐汔濟濡其尾不能續其終者二在險中未出也雖不當位而剛柔應則可濟之道自在特時未濟耳象曰火在水上未濟君子以慎辨物居方火在水上各居其方故君子于物慎辨而居之使各得其所薰蕕不使並器邪正不使並立華夷不使相雜則並育而不相害矣初六濡其尾吝象曰濡其尾亦不知極也妄進而徒濡其尾不知進退之宜極矣九二曵其輪貞吉象曰九二貞吉中以行正也九二時未能出險而曵其輪其貞而吉者以中行正也六三未濟征凶利涉大川象曰未濟征凶位不當也六三以不當位而征凶又以將出坎而利涉也九四貞吉悔亡震用伐鬼方三年有賞于大國象曰貞吉悔亡志行也九四得五而志行非振動奮迅如伐鬼方之艱難至三年之堅忍不能有賞于大國也六五貞吉无悔君子之光有孚吉象曰君子之光其暉吉也六五柔中文明故貞吉无悔君子之光輝動于物莫不孚之而吉也上九有孚于飲酒无咎濡其首有孚失是象曰飲酒濡首亦不知節也上九濟之時將至惟自信自養従容俟時故有有孚飲酒之象然樂志者易于溺志至于飲酒濡首則于有孚之道失其是矣周易易簡說卷二
